<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能托管广告 - 报告中心</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
    --text: #e1e4ed; --text2: #8b8fa3; --accent: #6366f1;
    --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
    --blue: #3b82f6; --orange: #f97316;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }

  /* Top nav bar */
  .topbar { background:var(--card); border-bottom:1px solid var(--border); padding:10px 32px; display:flex; align-items:center; justify-content:space-between; }
  .topbar .left { display:flex; align-items:center; gap:16px; }
  .topbar .logo { font-size:15px; font-weight:600; display:flex; align-items:center; gap:6px; }
  .topbar .nav-link { color:var(--text2); text-decoration:none; font-size:13px; padding:4px 10px; border-radius:4px; transition:all .2s; }
  .topbar .nav-link:hover { color:var(--text); background:rgba(255,255,255,.05); }
  .topbar .nav-link.active { color:var(--accent); background:rgba(99,102,241,.1); }

  /* Group switcher */
  .group-bar { background:linear-gradient(135deg,#1e1b4b,#312e81); border-bottom:1px solid var(--border); }
  .group-tabs { display:flex; padding:0 32px; gap:0; overflow-x:auto; }
  .group-tab { padding:12px 20px; cursor:pointer; font-size:13px; color:rgba(255,255,255,.55); border-bottom:2px solid transparent; white-space:nowrap; transition:all .2s; user-select:none; display:flex; align-items:center; gap:6px; }
  .group-tab:hover { color:rgba(255,255,255,.8); }
  .group-tab.active { color:#fff; border-bottom-color:var(--accent); font-weight:500; }
  .group-tab .dot { width:6px; height:6px; border-radius:50%; }
  .group-tab .dot.on { background:var(--green); }
  .group-tab .dot.off { background:var(--red); }

  /* Header info */
  .header { background:linear-gradient(135deg,#1e1b4b,#312e81); padding:16px 32px 20px; }
  .header .group-info { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .header .group-name { font-size:20px; font-weight:600; }
  .header .group-meta { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .header .tag { background:rgba(255,255,255,0.1); padding:4px 12px; border-radius:6px; font-size:13px; }
  .header .goal-tag { padding:4px 12px; border-radius:6px; font-size:12px; font-weight:600; }
  .header .date-nav { display:flex; align-items:center; gap:12px; margin-top:10px; }
  .header .date-nav select { background:rgba(255,255,255,0.1); color:var(--text); border:1px solid rgba(255,255,255,0.2); padding:6px 12px; border-radius:6px; font-size:13px; }

  .tabs { display:flex; background:var(--card); border-bottom:1px solid var(--border); padding:0 32px; gap:0; overflow-x:auto; }
  .tab { padding:14px 24px; cursor:pointer; font-size:14px; color:var(--text2); border-bottom:2px solid transparent; white-space:nowrap; transition:all .2s; user-select:none; }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:500; }

  .container { max-width:1200px; margin:0 auto; padding:24px 32px; }
  .section { display:none; }
  .section.active { display:block; }
  .loading { text-align:center; padding:60px; color:var(--text2); font-size:16px; }

  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:20px; }
  .card h2 { font-size:17px; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .card h3 { font-size:15px; margin:16px 0 12px; color:var(--text2); }

  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; }
  .stat-box { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; padding:14px; text-align:center; }
  .stat-box .label { font-size:12px; color:var(--text2); }
  .stat-box .value { font-size:22px; font-weight:700; margin-top:4px; }
  .stat-box .change { font-size:12px; margin-top:2px; }
  .up { color:var(--red); }
  .down { color:var(--green); }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:10px 12px; background:rgba(255,255,255,0.04); color:var(--text2); font-weight:500; border-bottom:1px solid var(--border); white-space:nowrap; }
  td { padding:10px 12px; border-bottom:1px solid var(--border); }
  tr:hover td { background:rgba(99,102,241,0.05); }

  .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
  .badge-green { background:rgba(34,197,94,0.15); color:var(--green); }
  .badge-red { background:rgba(239,68,68,0.15); color:var(--red); }
  .badge-yellow { background:rgba(245,158,11,0.15); color:var(--yellow); }
  .badge-blue { background:rgba(59,130,246,0.15); color:var(--blue); }
  .badge-gray { background:rgba(139,143,163,0.15); color:var(--text2); }

  .status-success { color:var(--green); }
  .status-exist { color:var(--text2); }

  .campaign-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; }
  .campaign-card { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:10px; padding:18px; }
  .campaign-card .name { font-size:13px; font-weight:600; margin-bottom:8px; }
  .campaign-card .meta { font-size:12px; color:var(--text2); margin-bottom:12px; }
  .campaign-card .mini-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .campaign-card .mini-stat { font-size:12px; }
  .campaign-card .mini-stat span { color:var(--text2); }

  .layer-header { display:flex; align-items:center; gap:8px; margin:20px 0 10px; font-size:15px; font-weight:600; }
  .layer-count { font-size:13px; color:var(--text2); font-weight:400; }

  .anomaly { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); border-radius:8px; padding:14px 16px; margin-bottom:10px; display:flex; gap:10px; align-items:flex-start; }
  .anomaly .icon { font-size:18px; flex-shrink:0; }
  .anomaly .text { font-size:13px; }

  .action-summary { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
  .action-chip { display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:8px; padding:8px 14px; font-size:13px; }
  .action-chip .num { font-size:20px; font-weight:700; }

  .result-bar { display:flex; height:8px; border-radius:4px; overflow:hidden; margin:12px 0; }
  .result-bar .seg { height:100%; }
  .result-bar .seg-ok { background:var(--green); }
  .result-bar .seg-exist { background:var(--text2); }
  .result-bar .seg-fail { background:var(--red); }

  /* No data state */
  .no-data { text-align:center; padding:80px 20px; }
  .no-data .icon { font-size:48px; margin-bottom:12px; }
  .no-data .title { font-size:18px; font-weight:600; margin-bottom:8px; }
  .no-data .desc { color:var(--text2); font-size:14px; }

  .footer { text-align:center; padding:24px; color:var(--text2); font-size:12px; border-top:1px solid var(--border); margin-top:40px; }

  @media (max-width:768px) {
    .container { padding:16px; }
    .header { padding:16px; }
    .tabs { padding:0 16px; }
    .tab { padding:12px 16px; font-size:13px; }
    .stat-grid { grid-template-columns:repeat(2,1fr); }
    .topbar { padding:10px 16px; }
    .group-tabs { padding:0 16px; }
  }
</style>
</head>
<body>

<!-- Top navigation -->
<div class="topbar">
  <div class="left">
    <div class="logo">🎯 智能托管广告</div>
    <a href="index.html" class="nav-link active">📊 报告中心</a>
    <a href="config.html" class="nav-link">⚙️ 托管组配置</a>
    <a href="weekly-report.html" class="nav-link">📈 周报分析</a>
  </div>
</div>

<!-- Group switcher tabs -->
<div class="group-bar">
  <div class="group-tabs" id="groupTabs"></div>
</div>

<!-- Header: current group info -->
<div class="header" id="headerArea">
  <div class="group-info">
    <span class="group-name" id="headerGroupName">加载中...</span>
  </div>
  <div class="group-meta" id="headerMeta"></div>
  <div class="date-nav">
    <span style="font-size:13px;color:rgba(255,255,255,.6);">📅 报告日期:</span>
    <select id="dateSelect" onchange="loadReport(currentGroupId, this.value)"></select>
  </div>
</div>

<!-- Content tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('overview',this)">📋 整体概览</div>
  <div class="tab" onclick="switchTab('analysis',this)">📈 智能分析报告</div>
  <div class="tab" onclick="switchTab('actions',this)">🎯 操作指示清单</div>
  <div class="tab" onclick="switchTab('execlog',this)">✅ 执行结果</div>
</div>

<div class="container">
  <div id="loadingMsg" class="loading">加载数据中...</div>
  <div id="overview" class="section"></div>
  <div id="analysis" class="section"></div>
  <div id="actions" class="section"></div>
  <div id="execlog" class="section"></div>
</div>

<div class="footer">
  Smart Ads Agent · 智能托管广告系统 · 数据每日自动更新
</div>

<script>
let DATA = null;
let currentGroupId = null;
let groups = [];

const GOALS = {
  'expand-traffic': { icon:'🚀', label:'拓展流量', bg:'rgba(59,130,246,.15)', color:'var(--blue)' },
  'boost-sales': { icon:'📈', label:'扩大销量·推动增长', bg:'rgba(34,197,94,.15)', color:'var(--green)' },
  'surge-sales': { icon:'⚡', label:'扩大销量·冲量增长', bg:'rgba(249,115,22,.15)', color:'var(--orange)' },
  'steady-optimize': { icon:'⚖️', label:'稳定增效', bg:'rgba(99,102,241,.15)', color:'var(--accent)' },
  'clearance': { icon:'📦', label:'清仓回收', bg:'rgba(245,158,11,.15)', color:'var(--yellow)' }
};

// ===== Group Management =====
async function loadGroups() {
  // Try API first (local dev), then static file (GitHub Pages), then localStorage
  const sources = ['/api/config?t=' + Date.now(), 'config/groups.json?t=' + Date.now()];
  for (const url of sources) {
    try {
      const resp = await fetch(url);
      if (resp.ok) {
        const cfg = await resp.json();
        groups = (cfg.groups || []).filter(g => g.enabled);
        if (groups.length) return groups;
      }
    } catch(e) {}
  }
  // Final fallback: localStorage
  const saved = localStorage.getItem('smart-ads-groups-v2');
  if (saved) {
    try {
      const cfg = JSON.parse(saved);
      groups = (cfg.groups || []).filter(g => g.enabled);
    } catch(e) { groups = []; }
  }
  return groups;
}

function renderGroupTabs() {
  const container = document.getElementById('groupTabs');
  if (!groups.length) {
    container.innerHTML = '<div style="padding:12px 20px;font-size:13px;color:rgba(255,255,255,.4);">暂无已启用的托管组 · <a href="config.html" style="color:var(--accent);">去配置</a></div>';
    return;
  }
  container.innerHTML = groups.map(g => `
    <div class="group-tab ${g.id===currentGroupId?'active':''}" onclick="switchGroup('${g.id}')">
      <span class="dot on"></span>
      ${esc(g.name)}
      <span style="font-size:11px;color:rgba(255,255,255,.3);">(${g.campaignIds?.length||0})</span>
    </div>
  `).join('');
}

function renderHeader(g) {
  document.getElementById('headerGroupName').textContent = g.name;
  const goal = GOALS[g.macroGoal] || GOALS['boost-sales'];
  const p = g.product || {};
  const tags = [
    p.asin ? `<span class="tag">ASIN: ${esc(p.asin)}</span>` : '',
    p.spu ? `<span class="tag">SPU: ${esc(p.spu)}</span>` : '',
    p.price ? `<span class="tag">💰 $${p.price}</span>` : '',
    p.account ? `<span class="tag">📍 ${esc(p.account)} / ${p.site||'US'}</span>` : '',
    `<span class="goal-tag" style="background:${goal.bg};color:${goal.color}">${goal.icon} ${goal.label}</span>`,
    `<span class="tag">🎯 目标ACOS ≤${g.targetAcos||20}%</span>`,
    `<span class="tag">💵 预算上限 $${g.budgetLimit||300}/天</span>`,
    `<span class="tag">📊 ${g.campaignIds?.length||0}个广告活动</span>`
  ].filter(Boolean).join('');
  document.getElementById('headerMeta').innerHTML = tags;
}

function switchGroup(groupId) {
  currentGroupId = groupId;
  const g = groups.find(x => x.id === groupId);
  if (!g) return;
  renderGroupTabs();
  renderHeader(g);
  // Reset content tabs to overview
  document.querySelectorAll('.tab').forEach((t,i) => { t.classList.toggle('active', i===0); });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  // Load dates for this group
  loadDatesForGroup(groupId);
}

async function loadDatesForGroup(groupId) {
  const sel = document.getElementById('dateSelect');
  sel.innerHTML = '';
  let dates = null;
  try {
    const r = await fetch(`data/${groupId}/dates.json?t=${Date.now()}`);
    if (r.ok) dates = await r.json();
  } catch(e) {}
  if (dates && dates.length) {
    dates.sort();
    dates.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; sel.appendChild(o); });
    sel.value = dates[dates.length - 1];
    loadReport(groupId, dates[dates.length - 1]);
  } else {
    const o = document.createElement('option'); o.value = ''; o.textContent = '暂无数据'; sel.appendChild(o);
    loadReport(groupId, '');
  }
}

// ===== Data Loading =====
async function loadReport(groupId, date) {
  document.getElementById('loadingMsg').style.display = 'block';
  ['overview','analysis','actions','execlog'].forEach(id => {
    document.getElementById(id).innerHTML = '';
    document.getElementById(id).classList.remove('active');
  });

  // Only load from group-specific directory
  const candidates = date
    ? [`data/${groupId}/report-${date}.json`]
    : [`data/${groupId}/report-latest.json`];

  let data = null;
  for (const file of candidates) {
    try {
      const resp = await fetch(file + '?t=' + Date.now());
      if (resp.ok) { data = await resp.json(); break; }
    } catch(e) {}
  }

  document.getElementById('loadingMsg').style.display = 'none';

  if (!data) {
    document.getElementById('overview').innerHTML = `
      <div class="no-data">
        <div class="icon">📭</div>
        <div class="title">暂无报告数据</div>
        <div class="desc">该托管组尚未生成报告，工作流将在每日 17:30 自动执行并生成报告</div>
      </div>`;
    document.getElementById('overview').classList.add('active');
    return;
  }

  renderAll(data);
}

// ===== Tab Switching =====
function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById(id).classList.add('active');
}

// ===== Rendering Functions =====
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function acosColor(acos, target) {
  if (acos === 0) return '';
  if (acos <= target) return 'color:var(--green)';
  if (acos <= target * 1.5) return 'color:var(--yellow)';
  return 'color:var(--red)';
}
function acosBadge(acos) {
  if (acos <= 20) return `<span class="badge badge-green">${acos}%</span>`;
  if (acos <= 40) return `<span class="badge badge-yellow">${acos}%</span>`;
  return `<span class="badge badge-red">${acos}%</span>`;
}
function fmt(n) { return typeof n === 'number' ? n.toLocaleString() : n; }
function fmtD(n) { return typeof n === 'number' ? '$' + n.toFixed(2) : n; }

function norm(raw) {
  if (!raw) return {impressions:0,clicks:0,ctr:0,spend:0,cpc:0,orders:0,salesVolume:0,salesAmount:0,roas:0,acos:0};
  return {
    impressions: raw.impressions||0, clicks: raw.clicks||0,
    ctr: raw.ctr||0, spend: raw.spend||0, cpc: raw.cpc||0,
    orders: raw.orders||0,
    salesVolume: raw.salesVolume ?? raw.orders ?? 0,
    salesAmount: raw.salesAmount ?? raw.sales ?? 0,
    roas: raw.roas ?? (raw.spend>0 ? +((raw.salesAmount??raw.sales??0)/raw.spend).toFixed(2) : 0),
    acos: raw.acos||0
  };
}
function renderOverview(d) {
  const s7 = norm(d.summary.last7days || d.summary.seventh), sy = norm(d.summary.yesterday);
  const target = d.summary?.targetAcos || d.product?.targetAcos || 20;
  if (!d.summary.totalDailyBudget && d.campaigns) d.summary.totalDailyBudget = d.campaigns.reduce((s,c)=>s+(c.budget||0),0);
  return `
    <div class="card">
      <h2>📊 整体表现 — 最近7天</h2>
      <div class="stat-grid">
        <div class="stat-box"><div class="label">ACOS</div><div class="value" style="${acosColor(s7.acos,target)}">${s7.acos}%</div><div class="change ${s7.acos>target?'up':'down'}">${s7.acos>target?'⚠️ 超目标'+(s7.acos-target).toFixed(1)+'%':'✅ 已达目标'}</div></div>
        <div class="stat-box"><div class="label">总花费</div><div class="value">${fmtD(s7.spend)}</div><div class="change">日均 ${fmtD(s7.spend/7)}</div></div>
        <div class="stat-box"><div class="label">总订单</div><div class="value">${s7.orders}</div><div class="change">销量 ${s7.salesVolume}件</div></div>
        <div class="stat-box"><div class="label">总销售额</div><div class="value">${fmtD(s7.salesAmount)}</div><div class="change">日均 ${fmtD(s7.salesAmount/7)}</div></div>
        <div class="stat-box"><div class="label">ROAS</div><div class="value">${s7.roas}</div><div class="change">每$1→$${s7.roas}销售</div></div>
        <div class="stat-box"><div class="label">总曝光</div><div class="value">${fmt(s7.impressions)}</div><div class="change">CTR ${s7.ctr}%</div></div>
        <div class="stat-box"><div class="label">总点击</div><div class="value">${fmt(s7.clicks)}</div><div class="change">CPC ${fmtD(s7.cpc)}</div></div>
        <div class="stat-box"><div class="label">日预算合计</div><div class="value">${fmtD(d.summary.totalDailyBudget)}</div></div>
      </div>
    </div>
    <div class="card">
      <h2>📊 昨天表现</h2>
      <div class="stat-grid">
        <div class="stat-box"><div class="label">ACOS</div><div class="value" style="${acosColor(sy.acos,target)}">${sy.acos}%</div></div>
        <div class="stat-box"><div class="label">花费</div><div class="value">${fmtD(sy.spend)}</div></div>
        <div class="stat-box"><div class="label">订单</div><div class="value">${sy.orders}</div></div>
        <div class="stat-box"><div class="label">销售额</div><div class="value">${fmtD(sy.salesAmount)}</div></div>
        <div class="stat-box"><div class="label">曝光</div><div class="value">${fmt(sy.impressions)}</div></div>
        <div class="stat-box"><div class="label">点击</div><div class="value">${fmt(sy.clicks)}</div><div class="change">CTR ${sy.ctr}%</div></div>
      </div>
    </div>
    <div class="card">
      <h2>📦 ${d.campaigns.length}个广告活动概览</h2>
      <div class="campaign-grid">
        ${d.campaigns.map(c => {
          const c7 = norm(c.last7days || c.seventh), cy = norm(c.yesterday);
          const cid = c.id || c.campaignId || '';
          const tInfo = c.targetingCount ? ` | ${c.targetingCount}个${c.targetingType}` : '';
          return `
          <div class="campaign-card">
            <div class="name">${c.name}</div>
            <div class="meta">ID: ${cid} | 预算: $${c.budget}/日${tInfo}</div>
            <div class="mini-grid">
              <div class="mini-stat"><span>7天ACOS:</span> <strong style="${acosColor(c7.acos,target)}">${c7.acos}%</strong></div>
              <div class="mini-stat"><span>昨天ACOS:</span> <strong style="${acosColor(cy.acos,target)}">${cy.acos}%</strong></div>
              <div class="mini-stat"><span>7天花费:</span> ${fmtD(c7.spend)}</div>
              <div class="mini-stat"><span>昨天花费:</span> ${fmtD(cy.spend)}</div>
              <div class="mini-stat"><span>7天订单:</span> ${c7.orders}单</div>
              <div class="mini-stat"><span>昨天订单:</span> ${cy.orders}单</div>
              <div class="mini-stat"><span>7天销售:</span> ${fmtD(c7.salesAmount)}</div>
              <div class="mini-stat"><span>昨天销售:</span> ${fmtD(cy.salesAmount)}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

function renderKeywordTable(keywords, showSuggestion) {
  if (!keywords || !keywords.length) return '<p style="color:var(--text2);font-size:13px;">暂无数据</p>';
  const hasDetail = keywords[0].impressions != null;
  if (showSuggestion) {
    const hdrs = hasDetail ? '<th>曝光</th><th>点击</th>' : '';
    return `<table><tr><th>关键词</th><th>竞价</th>${hdrs}<th>花费</th><th>订单</th><th>建议</th></tr>
      ${keywords.map(k=>`<tr><td>${k.keyword}</td><td>${fmtD(k.bid)}</td>${hasDetail?`<td>${fmt(k.impressions)}</td><td>${k.clicks}</td>`:''}<td>${fmtD(k.spend)}</td><td>${k.orders}</td><td><span class="badge badge-gray">${k.suggestion||k.note||'—'}</span></td></tr>`).join('')}</table>`;
  }
  if (hasDetail) {
    return `<table><tr><th>关键词</th><th>竞价</th><th>曝光</th><th>点击</th><th>花费</th><th>订单</th><th>销售额</th><th>ACOS</th><th>CVR</th></tr>
      ${keywords.map(k=>`<tr ${k.acos>40?'style="background:rgba(239,68,68,0.06)"':''}><td>${k.keyword}</td><td>${fmtD(k.bid)}</td><td>${fmt(k.impressions)}</td><td>${k.clicks}</td><td>${k.spend>50?'<strong>':''}${fmtD(k.spend)}${k.spend>50?'</strong>':''}</td><td>${k.orders}</td><td>${fmtD(k.sales??k.salesAmount??0)}</td><td>${acosBadge(k.acos)}</td><td>${k.cvr}%</td></tr>`).join('')}</table>`;
  }
  return `<table><tr><th>关键词</th><th>竞价</th><th>花费</th><th>订单</th><th>ACOS</th><th>备注</th></tr>
    ${keywords.map(k=>`<tr ${k.acos>40?'style="background:rgba(239,68,68,0.06)"':''}><td>${k.keyword}</td><td>${fmtD(k.bid)}</td><td>${fmtD(k.spend)}</td><td>${k.orders}</td><td>${k.acos!=null?acosBadge(k.acos):'—'}</td><td>${k.note||'—'}</td></tr>`).join('')}</table>`;
}

function renderAnalysis(d) {
  const kl = d.keywordLayers || {};
  const hasKL = kl.excellent || kl.potential || kl.losing || kl.lowVolume;
  const hasReport = !!d.analysisReport;
  const hasSearchTerm = !!d.searchTermReport;
  return `
    <div style="margin-bottom:20px; display:flex; gap:12px; flex-wrap:wrap;">
      ${hasReport ? `<button onclick="showAnalysisReport()" style="background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500;transition:opacity .2s;" onmouseover="this.style.opacity=0.85" onmouseout="this.style.opacity=1">📋 查看完整分析报告</button>` : ''}
      ${hasSearchTerm ? `<button onclick="showSearchTermReport()" style="background:#10b981;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500;transition:opacity .2s;" onmouseover="this.style.opacity=0.85" onmouseout="this.style.opacity=1">🔎 查看搜索词报告</button>` : ''}
    </div>
    <div class="card">
      <h2>🔍 核心诊断</h2>
      ${(d.diagnosis||[]).map(a=>{
        const icon = a.icon || ({critical:'🚨',warning:'⚠️',info:'ℹ️',positive:'✅'}[a.level]||'📌');
        return `<div class="anomaly"><div class="icon">${icon}</div><div class="text">${a.text||a.message||''}</div></div>`;
      }).join('') || '<p style="color:var(--text2);">暂无诊断数据</p>'}
    </div>
    ${hasKL ? `<div class="card">
      <h2>📊 关键词分层分析（30天）</h2>
      <div class="layer-header">🟢 优质词 (ACOS <20%) <span class="layer-count">— ${(kl.excellent||[]).length}个</span></div>
      ${renderKeywordTable(kl.excellent)}
      <div class="layer-header">🟡 潜力词 (ACOS 20-30%) <span class="layer-count">— ${(kl.potential||[]).length}个</span></div>
      ${renderKeywordTable(kl.potential)}
      <div class="layer-header">🔴 亏损词 (ACOS >30%) <span class="layer-count">— ${(kl.losing||[]).length}个</span></div>
      ${renderKeywordTable(kl.losing)}
      <div class="layer-header">⚪ 零转化/低量词 <span class="layer-count">— ${(kl.lowVolume||[]).length}个</span></div>
      ${renderKeywordTable(kl.lowVolume, true)}
    </div>` : ''}
    ${(d.autoTargeting||[]).length ? `<div class="card">
      <h2>📊 自动投放分层分析</h2>
      <table><tr><th>投放类型</th><th>竞价</th><th>ACOS</th><th>建议</th></tr>
        ${d.autoTargeting.map(t=>`<tr><td>${t.type}${t.status?' <span class="badge badge-gray">'+t.status+'</span>':''}</td><td>${t.bid!=null?fmtD(t.bid):'—'}</td><td>${t.acos!=null?acosBadge(t.acos):'<span class="badge badge-gray">—</span>'}</td><td>${t.action||'—'}</td></tr>`).join('')}
      </table>
    </div>` : ''}
    ${d.forecast ? `<div class="card">
      <h2>🎯 预期效果</h2>
      <div class="stat-grid">
        <div class="stat-box"><div class="label">当前ACOS</div><div class="value up">${d.forecast.currentAcos||'—'}%</div></div>
        <div class="stat-box"><div class="label">→ 短期(3-5天)</div><div class="value" style="color:var(--yellow)">${d.forecast.shortTerm}</div></div>
        <div class="stat-box"><div class="label">→ 中期(2周)</div><div class="value" style="color:var(--green)">${d.forecast.midTerm}</div></div>
        <div class="stat-box"><div class="label">当前日均订单</div><div class="value">${d.forecast.currentDailyOrders}单</div></div>
        <div class="stat-box"><div class="label">→ 预期日均订单</div><div class="value" style="color:var(--green)">~${d.forecast.expectedDailyOrders}单</div></div>
        <div class="stat-box"><div class="label">日预算</div><div class="value">$${d.forecast.budgetBefore}→$${d.forecast.budgetAfter}</div></div>
      </div>
    </div>` : ''}`;
}

function renderActions(d) {
  const a = d.actions || {};
  const summary = a.summary || {};
  const bidDown = a.bidDown || [];
  const budgetAdjust = a.budgetAdjust || [];
  const bidUp = a.bidUp || [];
  const newKeywords = a.newKeywords || [];
  const pauseOps = a.pause || [];
  if (!summary.total) return `<div class="card"><h2>🎯 操作指示清单</h2><p style="color:var(--text2);">暂无操作建议</p></div>`;
  return `
    <div class="card">
      <h2>📋 操作摘要</h2>
      <div class="action-summary">
        <div class="action-chip"><div class="num" style="color:var(--red)">${summary.bidDown||0}</div> 降竞价 (P0止血)</div>
        <div class="action-chip"><div class="num" style="color:var(--blue)">${summary.budgetAdjust||0}</div> 预算调整 (P1重分配)</div>
        <div class="action-chip"><div class="num" style="color:var(--green)">${summary.bidUp||0}</div> 提竞价 (P2加注)</div>
        <div class="action-chip"><div class="num" style="color:var(--orange)">${summary.pause||0}</div> 暂停投放</div>
        <div class="action-chip"><div class="num" style="color:var(--accent)">${summary.newKeyword||0}</div> 新增关键词 (P3拓展)</div>
        <div class="action-chip"><div class="num">${summary.total||0}</div> 总计</div>
      </div>
    </div>
    ${bidDown.length ? `<div class="card"><h2>🔴 P0 止血 — 竞价下调</h2>
      <table><tr><th>#</th><th>广告活动</th><th>关键词</th><th>匹配</th><th>当前</th><th>目标</th><th>降幅</th><th>原因</th></tr>
        ${bidDown.map(r=>`<tr><td>${r.seq}</td><td>${r.campaign}</td><td>${r.keyword}</td><td>${r.match}</td><td>${fmtD(r.from)}</td><td><strong>${fmtD(r.to)}</strong></td><td>${r.change}</td><td>${r.reason}</td></tr>`).join('')}
      </table></div>` : ''}
    ${pauseOps.length ? `<div class="card"><h2>⏸️ 暂停投放</h2>
      <table><tr><th>#</th><th>广告活动</th><th>投放</th><th>匹配</th><th>当前竞价</th><th>原因</th></tr>
        ${pauseOps.map(r=>`<tr><td>${r.seq}</td><td>${r.campaign}</td><td>${r.keyword}</td><td>${r.match}</td><td>${fmtD(r.currentBid)}</td><td>${r.reason}</td></tr>`).join('')}
      </table></div>` : ''}
    ${budgetAdjust.length ? `<div class="card"><h2>📈 P1 预算重新分配</h2>
      <table><tr><th>#</th><th>广告活动</th><th>当前</th><th>目标</th><th>调幅</th><th>逻辑</th></tr>
        ${budgetAdjust.map(r=>`<tr><td>${r.seq}</td><td>${r.campaign}</td><td>$${r.from}/天</td><td><strong>$${r.to}/天</strong></td><td>${r.change}</td><td>${r.reason}</td></tr>`).join('')}
      </table></div>` : ''}
    ${bidUp.length ? `<div class="card"><h2>🟢 P2 加注赢家 — 竞价上调</h2>
      <table><tr><th>#</th><th>广告活动</th><th>关键词</th><th>匹配</th><th>当前</th><th>目标</th><th>涨幅</th><th>ACOS</th></tr>
        ${bidUp.map(r=>`<tr><td>${r.seq}</td><td>${r.campaign}</td><td>${r.keyword}</td><td>${r.match}</td><td>${fmtD(r.from)}</td><td><strong>${fmtD(r.to)}</strong></td><td>${r.change}</td><td>${r.acos!=null?r.acos+'%':'—'}</td></tr>`).join('')}
      </table></div>` : ''}
    ${newKeywords.length ? `<div class="card"><h2>🆕 P3 新增精准关键词</h2>
      <table><tr><th>#</th><th>关键词</th><th>匹配</th><th>竞价</th><th>目标活动</th><th>逻辑</th></tr>
        ${newKeywords.map(r=>`<tr><td>${r.seq}</td><td>${r.keyword}</td><td>${r.match}</td><td>${fmtD(r.bid)}</td><td>${r.campaign}</td><td>${r.reason}</td></tr>`).join('')}
      </table></div>` : ''}`;
}

function renderExeclog(d) {
  const e = d.execution || {};
  if (!e.status) return `<div class="card"><h2>✅ 执行结果</h2><p style="color:var(--text2);">暂无执行数据</p></div>`;
  const total = e.totalOps||e.totalActions||0, success = e.successOps||e.successCount||0, existed = e.existed||0, failed = e.failedOps||e.failedCount||0;
  const okPct = total>0?(success/total*100).toFixed(1):'0';
  const exPct = total>0?(existed/total*100).toFixed(1):'0';
  const failPct = total>0?(failed/total*100).toFixed(1):'0';
  const operations = e.operations || [];
  const budgetChanges = e.budgetChanges || [];
  return `
    <div class="card">
      <h2>✅ 执行摘要</h2>
      <div style="font-size:13px;color:var(--text2);margin-bottom:12px;">执行时间: ${e.executedAt?new Date(e.executedAt).toLocaleString('zh-CN'):'—'}${e.endTime?' ~ '+new Date(e.endTime).toLocaleTimeString('zh-CN'):''} | ${e.method||'EIP Browser'}</div>
      <div class="stat-grid" style="grid-template-columns:repeat(4,1fr);">
        <div class="stat-box"><div class="label">总操作</div><div class="value">${total}</div></div>
        <div class="stat-box"><div class="label">✅ 成功</div><div class="value status-success">${success}</div></div>
        <div class="stat-box"><div class="label">⚠️ 已存在</div><div class="value status-exist">${existed}</div></div>
        <div class="stat-box"><div class="label">❌ 失败</div><div class="value" style="color:${failed>0?'var(--red)':'var(--green)'}">${failed}</div></div>
      </div>
      <div class="result-bar">
        <div class="seg seg-ok" style="width:${okPct}%"></div>
        <div class="seg seg-exist" style="width:${exPct}%"></div>
        ${failed>0?`<div class="seg seg-fail" style="width:${failPct}%"></div>`:''}
      </div>
      <div style="display:flex;gap:16px;font-size:12px;color:var(--text2);">
        <span>🟢 成功 ${okPct}%</span> <span>⚪ 已存在 ${exPct}%</span> <span>🔴 失败 ${failed>0?failPct:'0'}%</span>
      </div>
    </div>
    ${operations.length ? `<div class="card"><h2>📋 全部执行记录</h2>
      <table><tr><th>#</th><th>类型</th><th>目标</th><th>调整前</th><th>调整后</th><th>状态</th></tr>
        ${operations.map(r=>{
          let typeLabel = {'bidDown':'⬇️ 降竞价','bidUp':'⬆️ 提竞价','budget':'📊 预算','budgetDown':'📉 预算下调','budgetUp':'📈 预算上调','pause':'⏸️ 暂停','newKeyword':'🆕 新增'}[r.type]||r.type;
          let target = r.target||r.keyword||r.campaign||'';
          let from = r.from!==undefined?(r.type.includes('budget')?'$'+r.from+'/天':fmtD(r.from)):(r.currentBid?fmtD(r.currentBid):'—');
          let to = r.to!==undefined?(r.type.includes('budget')?'$'+r.to+'/天':fmtD(r.to)):(r.type==='pause'?'暂停':r.bid?fmtD(r.bid):'—');
          let status = r.status==='success'?'<span class="status-success">✅ 成功</span>':r.status==='existed'?'<span class="status-exist">⚠️ 已存在</span>':'<span style="color:var(--red)">❌ 失败</span>';
          return `<tr><td>${r.seq}</td><td>${typeLabel}</td><td>${target}</td><td>${from}</td><td>${to}</td><td>${status}</td></tr>`;
        }).join('')}
      </table></div>` : ''}
    ${budgetChanges.length ? `<div class="card"><h2>💰 预算变化汇总</h2>
      <table><tr><th>活动</th><th>调整前</th><th>调整后</th><th>变化</th></tr>
        ${budgetChanges.map(b=>`<tr><td>${b.campaign}</td><td>$${b.before}/天</td><td>$${b.after}/天</td><td style="color:${b.change>0?'var(--red)':b.change<0?'var(--green)':'var(--text2)'};">${b.change>0?'+':''}${b.change===0?'不变':'$'+b.change}</td></tr>`).join('')}
        <tr style="font-weight:700;"><td>总计</td><td>$${budgetChanges.reduce((s,b)=>s+b.before,0).toFixed(1)}/天</td><td>$${budgetChanges.reduce((s,b)=>s+b.after,0).toFixed(1)}/天</td><td>+$${budgetChanges.reduce((s,b)=>s+b.change,0).toFixed(1)}</td></tr>
      </table></div>` : ''}`;
}

function renderAll(d) {
  DATA = d;
  document.getElementById('loadingMsg').style.display = 'none';

  // If report has its own product info, update header with extra details
  if (d.product?.rating) {
    const extra = document.createElement('span');
    extra.className = 'tag';
    extra.textContent = `⭐ ${d.product.rating} (${d.product.reviews||0}条)`;
    document.getElementById('headerMeta').appendChild(extra);
  }

  document.getElementById('overview').innerHTML = renderOverview(d);
  document.getElementById('analysis').innerHTML = renderAnalysis(d);
  document.getElementById('actions').innerHTML = renderActions(d);
  document.getElementById('execlog').innerHTML = renderExeclog(d);
  document.getElementById('overview').classList.add('active');
}

// ===== Init =====
async function init() {
  await loadGroups();
  if (groups.length) {
    // Check URL hash for group id
    const hash = location.hash.replace('#','');
    currentGroupId = groups.find(g=>g.id===hash) ? hash : groups[0].id;
    renderGroupTabs();
    switchGroup(currentGroupId);
  } else {
    renderGroupTabs();
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('overview').innerHTML = `
      <div class="no-data">
        <div class="icon">📭</div>
        <div class="title">暂无托管组</div>
        <div class="desc">请先 <a href="config.html" style="color:var(--accent);">配置托管组</a></div>
      </div>`;
    document.getElementById('overview').classList.add('active');
  }
}

init();
function getCurrentReport() { return DATA; }

async function showAnalysisReport() {
  const report = getCurrentReport();
  const mdPath = report?.analysisReport;
  if (!mdPath) {
    alert('本日报告暂无完整分析');
    return;
  }
  try {
    const fullPath = mdPath.startsWith('data/') ? mdPath : `data/${currentGroupId}/${mdPath}`;
    const resp = await fetch(fullPath + '?t=' + Date.now());
    if (!resp.ok) throw new Error('Not found');
    const md = await resp.text();
    const html = marked.parse(md);
    const modal = document.getElementById('analysisModal');
    document.getElementById('analysisContent').innerHTML = html;
    modal.style.display = 'flex';
  } catch(e) {
    alert('加载分析报告失败: ' + e.message);
  }
}

async function showSearchTermReport() {
  const report = getCurrentReport();
  const mdPath = report?.searchTermReport;
  if (!mdPath) {
    alert('本日暂无搜索词报告');
    return;
  }
  try {
    const fullPath = mdPath.startsWith('data/') ? mdPath : `data/${currentGroupId}/${mdPath}`;
    const resp = await fetch(fullPath + '?t=' + Date.now());
    if (!resp.ok) throw new Error('Not found');
    const md = await resp.text();
    const html = marked.parse(md);
    const modal = document.getElementById('searchTermModal');
    document.getElementById('searchTermContent').innerHTML = html;
    modal.style.display = 'flex';
  } catch(e) {
    alert('加载搜索词报告失败: ' + e.message);
  }
}
</script>

<div id="analysisModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; justify-content:center; align-items:center; padding:20px;">
  <div style="background:var(--card, #1a1d27); border-radius:12px; max-width:900px; width:100%; max-height:90vh; overflow-y:auto; padding:30px; position:relative;">
    <button onclick="document.getElementById('analysisModal').style.display='none'" style="position:absolute; top:12px; right:16px; background:none; border:none; color:var(--text2, #888); font-size:24px; cursor:pointer;">&times;</button>
    <div id="analysisContent" style="color:var(--text, #e0e0e0); line-height:1.8; font-size:14px;"></div>
  </div>
</div>

<div id="searchTermModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; justify-content:center; align-items:center; padding:20px;">
  <div style="background:var(--card, #1a1d27); border-radius:12px; max-width:900px; width:100%; max-height:90vh; overflow-y:auto; padding:30px; position:relative;">
    <button onclick="document.getElementById('searchTermModal').style.display='none'" style="position:absolute; top:12px; right:16px; background:none; border:none; color:var(--text2, #888); font-size:24px; cursor:pointer;">&times;</button>
    <div id="searchTermContent" style="color:var(--text, #e0e0e0); line-height:1.8; font-size:14px;"></div>
  </div>
</div>

</body>
</html>

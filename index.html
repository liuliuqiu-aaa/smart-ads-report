<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能托管广告 - 报告中心</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
    --text: #e1e4ed; --text2: #8b8fa3; --accent: #6366f1;
    --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
    --blue: #3b82f6; --orange: #f97316;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
  .topbar { background:var(--card); border-bottom:1px solid var(--border); padding:10px 32px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .topbar .left { display:flex; align-items:center; gap:16px; }
  .topbar .logo { font-size:15px; font-weight:600; display:flex; align-items:center; gap:6px; }
  .topbar .nav-link { color:var(--text2); text-decoration:none; font-size:13px; padding:4px 10px; border-radius:4px; transition:all .2s; }
  .topbar .nav-link:hover { color:var(--text); background:rgba(255,255,255,.05); }
  .topbar .nav-link.active { color:var(--accent); background:rgba(99,102,241,.1); }
  .group-bar { background:linear-gradient(135deg,#1e1b4b,#312e81); border-bottom:1px solid var(--border); position:sticky; top:45px; z-index:99; }
  .group-tabs { display:flex; padding:0 32px; gap:0; overflow-x:auto; scrollbar-width:none; }
  .group-tabs::-webkit-scrollbar { display:none; }
  .group-tab { padding:12px 20px; cursor:pointer; font-size:13px; color:rgba(255,255,255,.55); border-bottom:2px solid transparent; white-space:nowrap; transition:all .2s; user-select:none; display:flex; align-items:center; gap:6px; }
  .group-tab:hover { color:rgba(255,255,255,.8); }
  .group-tab.active { color:#fff; border-bottom-color:var(--accent); font-weight:500; }
  .group-tab .dot { width:6px; height:6px; border-radius:50%; background:var(--green); }
  .container { max-width:1200px; margin:0 auto; padding:24px 32px; }
  .loading { text-align:center; padding:60px; color:var(--text2); font-size:16px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:20px; }
  .card h2 { font-size:17px; margin-bottom:16px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; }
  .stat-box { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; padding:14px; text-align:center; }
  .stat-box .label { font-size:12px; color:var(--text2); }
  .stat-box .value { font-size:22px; font-weight:700; margin-top:4px; }
  .stat-box .sub { font-size:12px; color:var(--text2); margin-top:2px; }
  .group-cards-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; }
  .group-card { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:10px; padding:20px; cursor:pointer; transition:all .2s; }
  .group-card:hover { border-color:var(--accent); background:rgba(99,102,241,.04); transform:translateY(-2px); }
  .group-card .gc-name { font-size:15px; font-weight:600; margin-bottom:8px; }
  .group-card .gc-goal { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; margin-bottom:12px; }
  .group-card .gc-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:13px; }
  .group-card .gc-stat span { color:var(--text2); }
  .group-card .gc-sparkline { margin-top:12px; height:40px; }
  .campaign-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; }
  .campaign-card { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:10px; padding:18px; }
  .campaign-card .c-name { font-size:13px; font-weight:600; margin-bottom:4px; word-break:break-all; }
  .campaign-card .c-meta { font-size:12px; color:var(--text2); margin-bottom:12px; display:flex; gap:8px; flex-wrap:wrap; }
  .campaign-card .c-meta .tag { background:rgba(255,255,255,.06); padding:2px 6px; border-radius:4px; }
  .campaign-card .c-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; font-size:12px; }
  .campaign-card .c-stats .cs-label { color:var(--text2); }
  .campaign-card .sparkline-wrap { margin-top:10px; height:36px; }
  .daily-entry { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:10px; padding:16px 20px; margin-bottom:12px; }
  .daily-entry .de-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
  .daily-entry .de-date { font-size:15px; font-weight:600; }
  .daily-entry .de-stats { display:flex; gap:16px; font-size:13px; }
  .daily-entry .de-stats span { color:var(--text2); }
  .daily-entry .de-actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .de-btn { padding:6px 14px; border-radius:6px; font-size:12px; cursor:pointer; border:1px solid var(--border); background:rgba(255,255,255,.04); color:var(--text); transition:all .2s; display:inline-flex; align-items:center; gap:4px; }
  .de-btn:hover { background:rgba(99,102,241,.15); border-color:var(--accent); }
  .de-btn.disabled { opacity:.35; cursor:not-allowed; pointer-events:none; }
  .chart-wrap { position:relative; height:280px; margin-top:12px; }
  .charts-trio { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
  .charts-trio .chart-cell { background:rgba(255,255,255,.02); border:1px solid var(--border); border-radius:8px; padding:14px; }
  .charts-trio .chart-cell h3 { font-size:13px; color:var(--text2); margin-bottom:8px; text-align:center; }
  .charts-trio .chart-cell .chart-wrap { height:220px; margin-top:0; }
  .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
  .badge-green { background:rgba(34,197,94,0.15); color:var(--green); }
  .badge-red { background:rgba(239,68,68,0.15); color:var(--red); }
  .badge-yellow { background:rgba(245,158,11,0.15); color:var(--yellow); }
  .badge-blue { background:rgba(59,130,246,0.15); color:var(--blue); }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:1000; justify-content:center; align-items:flex-start; padding:40px 20px; overflow-y:auto; }
  .modal-overlay.open { display:flex; }
  .modal-content { background:var(--card); border:1px solid var(--border); border-radius:12px; max-width:920px; width:100%; padding:30px; position:relative; margin:auto; }
  .modal-close { position:absolute; top:12px; right:16px; background:none; border:none; color:var(--text2); font-size:24px; cursor:pointer; line-height:1; padding:4px; }
  .modal-close:hover { color:var(--text); }
  .md-body { color:var(--text); line-height:1.8; font-size:14px; }
  .md-body h1 { font-size:22px; margin:20px 0 12px; border-bottom:1px solid var(--border); padding-bottom:8px; }
  .md-body h2 { font-size:18px; margin:18px 0 10px; }
  .md-body h3 { font-size:15px; margin:14px 0 8px; color:var(--text); }
  .md-body p { margin:8px 0; }
  .md-body ul, .md-body ol { margin:8px 0 8px 24px; }
  .md-body li { margin:4px 0; }
  .md-body code { background:rgba(255,255,255,.08); padding:2px 6px; border-radius:4px; font-size:13px; font-family:'SF Mono',Monaco,Menlo,monospace; }
  .md-body pre { background:rgba(0,0,0,.3); border:1px solid var(--border); border-radius:8px; padding:16px; overflow-x:auto; margin:12px 0; }
  .md-body pre code { background:none; padding:0; }
  .md-body table { width:100%; border-collapse:collapse; margin:12px 0; font-size:13px; }
  .md-body th { text-align:left; padding:8px 10px; background:rgba(255,255,255,.04); color:var(--text2); border-bottom:1px solid var(--border); }
  .md-body td { padding:8px 10px; border-bottom:1px solid rgba(255,255,255,.06); }
  .md-body blockquote { border-left:3px solid var(--accent); padding-left:16px; color:var(--text2); margin:12px 0; }
  .md-body strong { color:#fff; }
  .md-body a { color:var(--accent); }
  .md-body hr { border:none; border-top:1px solid var(--border); margin:16px 0; }
  .no-data { text-align:center; padding:80px 20px; }
  .no-data .icon { font-size:48px; margin-bottom:12px; }
  .no-data .title { font-size:18px; font-weight:600; margin-bottom:8px; }
  .no-data .desc { color:var(--text2); font-size:14px; }
  .footer { text-align:center; padding:24px; color:var(--text2); font-size:12px; border-top:1px solid var(--border); margin-top:40px; }
  @media (max-width:768px) {
    .container { padding:16px; }
    .topbar { padding:10px 16px; }
    .group-tabs { padding:0 16px; }
    .group-tab { padding:10px 14px; font-size:12px; }
    .stat-grid { grid-template-columns:repeat(2,1fr); }
    .group-cards-grid { grid-template-columns:1fr; }
    .campaign-grid { grid-template-columns:1fr; }
    .chart-wrap { height:220px; }
    .charts-trio { grid-template-columns:1fr; }
    .daily-entry .de-header { flex-direction:column; align-items:flex-start; }
    .daily-entry .de-actions { flex-direction:column; }
    .de-btn { width:100%; text-align:center; justify-content:center; }
    .modal-content { padding:16px; }
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="left">
    <div class="logo">🎯 智能托管广告</div>
    <a href="index.html" class="nav-link active">📊 报告中心</a>
    <a href="config.html" class="nav-link">⚙️ 托管组配置</a>
    <a href="weekly-report.html" class="nav-link">📈 周报分析</a>
  </div>
</div>
<div class="group-bar"><div class="group-tabs" id="groupTabs"></div></div>
<div class="container" id="mainContent"><div class="loading" id="loadingMsg">加载数据中...</div></div>
<div class="modal-overlay" id="modal"><div class="modal-content"><button class="modal-close" onclick="closeModal()">&times;</button><div class="md-body" id="modalBody"></div></div></div>
<div class="footer">Smart Ads Agent · 智能托管广告系统 · 数据每日自动更新</div>
<script>
let groups=[], currentTab='all', trendCache={}, charts=[];
const GOALS={
  'expand-traffic':{icon:'🚀',label:'拓展流量',bg:'rgba(59,130,246,.15)',color:'#3b82f6'},
  'boost-sales':{icon:'📈',label:'扩大销量·推动增长',bg:'rgba(34,197,94,.15)',color:'#22c55e'},
  'surge-sales':{icon:'⚡',label:'扩大销量·冲量增长',bg:'rgba(249,115,22,.15)',color:'#f97316'},
  'steady-optimize':{icon:'⚖️',label:'稳定增效',bg:'rgba(99,102,241,.15)',color:'#6366f1'},
  'clearance':{icon:'📦',label:'清仓回收',bg:'rgba(245,158,11,.15)',color:'#f59e0b'}
};
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function fmt(n){return typeof n==='number'?n.toLocaleString():n;}
function fmtD(n){return typeof n==='number'?'$'+n.toFixed(2):n;}
function acosColor(v,t){if(!v)return'color:var(--text2)';return v<=t?'color:var(--green)':v<=t*1.5?'color:var(--yellow)':'color:var(--red)';}
function acosBadge(v,t){t=t||20;if(v<=t)return'<span class="badge badge-green">'+v+'%</span>';if(v<=t*1.5)return'<span class="badge badge-yellow">'+v+'%</span>';return'<span class="badge badge-red">'+v+'%</span>';}

async function loadGroups(){
  for(const url of ['/api/config?t='+Date.now(),'config/groups.json?t='+Date.now()]){
    try{const r=await fetch(url);if(r.ok){const c=await r.json();groups=(c.groups||[]).filter(g=>g.enabled);if(groups.length)return;}}catch(e){}
  }
  try{groups=(JSON.parse(localStorage.getItem('smart-ads-groups-v2')||'{}').groups||[]).filter(g=>g.enabled);}catch(e){groups=[];}
}
async function loadTrend(gid){
  if(trendCache[gid])return trendCache[gid];
  try{const r=await fetch('data/'+gid+'/trend-7d.json?t='+Date.now());if(r.ok){const d=await r.json();trendCache[gid]=d;return d;}}catch(e){}
  return null;
}
async function loadDates(gid){try{const r=await fetch('data/'+gid+'/dates.json?t='+Date.now());if(r.ok)return await r.json();}catch(e){}return[];}
async function loadMeta(gid,date){try{const r=await fetch('data/'+gid+'/daily/'+date+'/meta.json?t='+Date.now());if(r.ok)return await r.json();}catch(e){}return null;}

function killCharts(){charts.forEach(c=>{try{c.destroy();}catch(e){}});charts=[];}

// Shared chart defaults
const chartFont={color:'#8b8fa3',font:{size:11}};
const chartGrid={color:'rgba(255,255,255,.05)'};
const chartGridOff={drawOnChartArea:false};
function dualAxisOpts(yTitle,y1Title,y1Pct){
  return {
    responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{position:'bottom',labels:{color:'#8b8fa3',font:{size:11},boxWidth:12,padding:10}}},
    scales:{
      x:{ticks:chartFont,grid:chartGrid},
      y:{position:'left',ticks:chartFont,grid:chartGrid,title:{display:true,text:yTitle,color:'#8b8fa3',font:{size:10}}},
      y1:{position:'right',ticks:Object.assign({},chartFont,y1Pct?{callback:function(v){return parseFloat(v.toFixed(2))+'%';}}:{}),grid:chartGridOff,title:{display:true,text:y1Title,color:'#8b8fa3',font:{size:10}}}
    }
  };
}

function makeTripleCharts(prefix,days,targetAcos){
  const labels=days.map(d=>d.date.slice(5));

  // Chart 1: Ad Performance (spend, sales, acos)
  const el1=document.getElementById(prefix+'-perf');
  if(el1){
    const ch=new Chart(el1.getContext('2d'),{
      type:'line',
      data:{labels,datasets:[
        {label:'花费($)',data:days.map(d=>d.spend),borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.08)',yAxisID:'y',tension:.3,fill:true,pointRadius:3,pointHoverRadius:5,borderWidth:2},
        {label:'销售额($)',data:days.map(d=>d.sales),borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,.08)',yAxisID:'y',tension:.3,fill:true,pointRadius:3,pointHoverRadius:5,borderWidth:2},
        {label:'ACOS(%)',data:days.map(d=>d.acos),borderColor:'#ef4444',yAxisID:'y1',tension:.3,fill:false,pointRadius:3,pointHoverRadius:5,borderWidth:2,borderDash:[5,3],
          segment:{borderColor:function(c){return c.p1.parsed.y<=targetAcos?'#22c55e':'#ef4444';}}}
      ]},
      options:dualAxisOpts('花费/销售额 ($)','ACOS %',true)
    });
    charts.push(ch);
  }

  // Chart 2: Impressions & Clicks (impressions, clicks, ctr)
  const el2=document.getElementById(prefix+'-traffic');
  if(el2){
    const ch=new Chart(el2.getContext('2d'),{
      type:'line',
      data:{labels,datasets:[
        {label:'曝光量',data:days.map(d=>d.impressions||0),borderColor:'#6b7280',backgroundColor:'rgba(107,114,128,.1)',yAxisID:'y',tension:.3,fill:true,pointRadius:3,pointHoverRadius:5,borderWidth:2},
        {label:'点击量',data:days.map(d=>d.clicks||0),borderColor:'#f97316',backgroundColor:'rgba(249,115,22,.08)',yAxisID:'y',tension:.3,fill:false,pointRadius:3,pointHoverRadius:5,borderWidth:2},
        {label:'CTR(%)',data:days.map(d=>d.ctr||0),borderColor:'#f97316',yAxisID:'y1',tension:.3,fill:false,pointRadius:3,pointHoverRadius:5,borderWidth:2,borderDash:[5,3]}
      ]},
      options:dualAxisOpts('曝光/点击','CTR %',true)
    });
    charts.push(ch);
  }

  // Chart 3: Conversion (orders, salesVolume, cvr)
  const el3=document.getElementById(prefix+'-conv');
  if(el3){
    const ch=new Chart(el3.getContext('2d'),{
      type:'line',
      data:{labels,datasets:[
        {label:'订单',data:days.map(d=>d.orders),borderColor:'#8b5cf6',backgroundColor:'rgba(139,92,246,.08)',yAxisID:'y',tension:.3,fill:true,pointRadius:3,pointHoverRadius:5,borderWidth:2},
        {label:'销量',data:days.map(d=>d.salesVolume||d.orders),borderColor:'#eab308',backgroundColor:'rgba(234,179,8,.08)',yAxisID:'y',tension:.3,fill:false,pointRadius:3,pointHoverRadius:5,borderWidth:2},
        {label:'CVR(%)',data:days.map(d=>d.cvr||0),borderColor:'#a855f7',yAxisID:'y1',tension:.3,fill:false,pointRadius:3,pointHoverRadius:5,borderWidth:2,borderDash:[5,3]}
      ]},
      options:dualAxisOpts('订单/销量','CVR %',true)
    });
    charts.push(ch);
  }
}

function makeSparkline(el,data,color){
  const ch=new Chart(el.getContext('2d'),{type:'line',
    data:{labels:data.map((_,i)=>i),datasets:[{data,borderColor:color||'#6366f1',backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:.4,fill:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}},animation:false}
  });
  charts.push(ch);
}

function renderGroupTabs(){
  const c=document.getElementById('groupTabs');
  if(!groups.length){c.innerHTML='<div style="padding:12px 20px;font-size:13px;color:rgba(255,255,255,.4);">暂无托管组 · <a href="config.html" style="color:var(--accent);">去配置</a></div>';return;}
  let h='<div class="group-tab '+(currentTab==='all'?'active':'')+'" onclick="switchToAll()">📊 全部</div>';
  groups.forEach(g=>{h+='<div class="group-tab '+(currentTab===g.id?'active':'')+'" onclick="switchToGroup(\''+g.id+'\')"><span class="dot"></span>'+esc(g.name.length>16?g.name.slice(0,16)+'…':g.name)+'</div>';});
  c.innerHTML=h;
}

// ===== ALL TAB =====
async function renderAllTab(){
  killCharts();
  const mc=document.getElementById('mainContent');
  mc.innerHTML='<div class="loading">加载数据中...</div>';
  const results=await Promise.all(groups.map(g=>loadTrend(g.id)));
  let tSpend=0,tOrders=0,tSales=0,tBudget=0;
  const daysMap={};
  const gsums=[];
  for(let i=0;i<groups.length;i++){
    const g=groups[i],tr=results[i];
    if(!tr){gsums.push({g,tr:null,o:0,s:0,a:0,sl:0});continue;}
    let go=0,gs=0,gsl=0;
    (tr.days||[]).forEach(d=>{go+=d.orders;gs+=d.spend;gsl+=d.sales;if(!daysMap[d.date])daysMap[d.date]={date:d.date,orders:0,salesVolume:0,spend:0,sales:0,impressions:0,clicks:0};daysMap[d.date].orders+=d.orders;daysMap[d.date].salesVolume+=(d.salesVolume||d.orders);daysMap[d.date].spend+=d.spend;daysMap[d.date].sales+=d.sales;daysMap[d.date].impressions+=(d.impressions||0);daysMap[d.date].clicks+=(d.clicks||0);});
    let gb=0;Object.values(tr.campaigns||{}).forEach(c=>{gb+=c.budget||0;});
    tBudget+=gb;tSpend+=gs;tOrders+=go;tSales+=gsl;
    gsums.push({g,tr,o:go,s:gs,a:gsl>0?+((gs/gsl)*100).toFixed(1):0,sl:gsl});
  }
  const tAcos=tSales>0?+((tSpend/tSales)*100).toFixed(1):0;
  const bUtil=tBudget>0?+((tSpend/(tBudget*7))*100).toFixed(1):0;
  const allDays=Object.values(daysMap).sort((a,b)=>a.date.localeCompare(b.date));
  allDays.forEach(d=>{d.acos=d.sales>0?+((d.spend/d.sales)*100).toFixed(1):0;d.ctr=d.impressions>0?+((d.clicks/d.impressions)*100).toFixed(2):0;d.cvr=d.clicks>0?+((d.orders/d.clicks)*100).toFixed(2):0;});

  let h='<div class="card"><h2>📊 全局概览 — 最近7天汇总</h2><div class="stat-grid">';
  h+='<div class="stat-box"><div class="label">💰 总花费</div><div class="value" style="color:var(--orange)">'+fmtD(tSpend)+'</div><div class="sub">日均 '+fmtD(tSpend/7)+'</div></div>';
  h+='<div class="stat-box"><div class="label">📦 总订单</div><div class="value" style="color:var(--blue)">'+tOrders+'</div><div class="sub">日均 '+(tOrders/7).toFixed(1)+'单</div></div>';
  h+='<div class="stat-box"><div class="label">📈 总ACOS</div><div class="value" style="'+acosColor(tAcos,20)+'">'+tAcos+'%</div><div class="sub">'+(tAcos<=20?'✅ 达标':'⚠️ 超标')+'</div></div>';
  h+='<div class="stat-box"><div class="label">⚡ 预算利用率</div><div class="value">'+bUtil+'%</div><div class="sub">总日预算 '+fmtD(tBudget)+'</div></div>';
  h+='</div></div>';

  if(allDays.length){
    h+='<div class="card"><h2>📈 7天趋势 — 全部组合计</h2><div class="charts-trio">';
    h+='<div class="chart-cell"><h3>广告效果趋势</h3><div class="chart-wrap"><canvas id="all-perf"></canvas></div></div>';
    h+='<div class="chart-cell"><h3>曝光点击趋势</h3><div class="chart-wrap"><canvas id="all-traffic"></canvas></div></div>';
    h+='<div class="chart-cell"><h3>转化趋势</h3><div class="chart-wrap"><canvas id="all-conv"></canvas></div></div>';
    h+='</div></div>';
  }

  h+='<div class="card"><h2>🏷️ 各托管组概览</h2><div class="group-cards-grid">';
  gsums.forEach(gs=>{
    const g=gs.g, goal=GOALS[g.macroGoal]||GOALS['boost-sales'];
    h+='<div class="group-card" onclick="switchToGroup(\''+g.id+'\')">';
    h+='<div class="gc-name">'+esc(g.name)+'</div>';
    h+='<div class="gc-goal" style="background:'+goal.bg+';color:'+goal.color+'">'+goal.icon+' '+goal.label+'</div>';
    h+='<div class="gc-stats">';
    h+='<div class="gc-stat"><span>7天ACOS:</span> <strong style="'+acosColor(gs.a,g.targetAcos||20)+'">'+gs.a+'%</strong></div>';
    h+='<div class="gc-stat"><span>7天订单:</span> <strong>'+gs.o+'</strong></div>';
    h+='<div class="gc-stat"><span>7天花费:</span> <strong>'+fmtD(gs.s)+'</strong></div>';
    h+='<div class="gc-stat"><span>7天销售:</span> <strong>'+fmtD(gs.sl)+'</strong></div>';
    h+='</div>';
    if(gs.tr&&gs.tr.days){h+='<div class="gc-sparkline"><canvas id="spark-'+g.id+'"></canvas></div>';}
    h+='</div>';
  });
  h+='</div></div>';
  mc.innerHTML=h;
  requestAnimationFrame(()=>{
    if(allDays.length)makeTripleCharts('all',allDays,20);
    gsums.forEach(gs=>{
      if(gs.tr&&gs.tr.days){const el=document.getElementById('spark-'+gs.g.id);if(el)makeSparkline(el,gs.tr.days.map(d=>d.orders),'#3b82f6');}
    });
  });
}

// ===== GROUP TAB =====
async function renderGroupTab(gid){
  killCharts();
  const mc=document.getElementById('mainContent');
  mc.innerHTML='<div class="loading">加载数据中...</div>';
  const g=groups.find(x=>x.id===gid);
  if(!g){mc.innerHTML='<div class="no-data"><div class="icon">❓</div><div class="title">找不到托管组</div></div>';return;}
  const [trend,dates]=await Promise.all([loadTrend(gid),loadDates(gid)]);
  if(!trend){
    mc.innerHTML='<div class="no-data"><div class="icon">📭</div><div class="title">暂无报告数据</div><div class="desc">该托管组尚未生成报告，工作流将在每日自动执行</div></div>';
    return;
  }
  const goal=GOALS[g.macroGoal]||GOALS['boost-sales'];
  const days=trend.days||[];
  let tO=0,tS=0,tSl=0;
  days.forEach(d=>{tO+=d.orders;tS+=d.spend;tSl+=d.sales;});
  const tA=tSl>0?+((tS/tSl)*100).toFixed(1):0;
  const tR=tS>0?+(tSl/tS).toFixed(2):0;

  let h='';
  // Group overview card
  h+='<div class="card">';
  h+='<h2>'+goal.icon+' '+esc(g.name)+' <span class="badge" style="background:'+goal.bg+';color:'+goal.color+';margin-left:8px;">'+goal.label+'</span></h2>';
  h+='<div class="stat-grid">';
  h+='<div class="stat-box"><div class="label">🎯 目标ACOS</div><div class="value">&le;'+g.targetAcos+'%</div></div>';
  h+='<div class="stat-box"><div class="label">📈 7天ACOS</div><div class="value" style="'+acosColor(tA,g.targetAcos)+'">'+tA+'%</div><div class="sub">'+(tA<=g.targetAcos?'✅ 达标':'⚠️ 超目标'+(tA-g.targetAcos).toFixed(1)+'%')+'</div></div>';
  h+='<div class="stat-box"><div class="label">📦 7天订单</div><div class="value" style="color:var(--blue)">'+tO+'</div><div class="sub">日均 '+(tO/7).toFixed(1)+'单</div></div>';
  h+='<div class="stat-box"><div class="label">💰 7天花费</div><div class="value" style="color:var(--orange)">'+fmtD(tS)+'</div><div class="sub">日均 '+fmtD(tS/7)+'</div></div>';
  h+='<div class="stat-box"><div class="label">💵 7天销售额</div><div class="value">'+fmtD(tSl)+'</div></div>';
  h+='<div class="stat-box"><div class="label">📊 ROAS</div><div class="value">'+tR+'</div><div class="sub">每$1&rarr;$'+tR+'</div></div>';
  h+='</div></div>';

  // 7-day trend charts (triple)
  if(days.length){
    h+='<div class="card"><h2>📈 7天趋势</h2><div class="charts-trio">';
    h+='<div class="chart-cell"><h3>广告效果趋势</h3><div class="chart-wrap"><canvas id="grp-perf"></canvas></div></div>';
    h+='<div class="chart-cell"><h3>曝光点击趋势</h3><div class="chart-wrap"><canvas id="grp-traffic"></canvas></div></div>';
    h+='<div class="chart-cell"><h3>转化趋势</h3><div class="chart-wrap"><canvas id="grp-conv"></canvas></div></div>';
    h+='</div></div>';
  }

  // Campaign list
  const camps=Object.entries(trend.campaigns||{});
  if(camps.length){
    h+='<div class="card"><h2>📦 广告活动 ('+camps.length+')</h2><div class="campaign-grid">';
    camps.forEach(([cid,c])=>{
      let cO=0,cS=0,cSl=0;
      (c.days||[]).forEach(d=>{cO+=d.orders;cS+=d.spend;cSl+=d.sales;});
      const cA=cSl>0?+((cS/cSl)*100).toFixed(1):0;
      // Simplify campaign name - remove TEST-AI- prefix and date suffix
      let displayName=c.name.replace(/^TEST-AI-/,'').replace(/-\d{14}$/,'');
      h+='<div class="campaign-card">';
      h+='<div class="c-name">'+esc(displayName)+'</div>';
      h+='<div class="c-meta"><span class="tag">'+esc(c.type)+'</span><span class="tag">预算 $'+c.budget+'/天</span></div>';
      h+='<div class="c-stats">';
      h+='<div><span class="cs-label">ACOS</span><br><strong style="'+acosColor(cA,g.targetAcos)+'">'+cA+'%</strong></div>';
      h+='<div><span class="cs-label">花费</span><br><strong>'+fmtD(cS)+'</strong></div>';
      h+='<div><span class="cs-label">订单</span><br><strong>'+cO+'</strong></div>';
      h+='</div>';
      h+='<div class="sparkline-wrap"><canvas id="camp-spark-'+cid+'"></canvas></div>';
      h+='</div>';
    });
    h+='</div></div>';
  }

  // Daily reports section
  if(dates.length){
    h+='<div class="card"><h2>📋 每日报告</h2><div id="dailyReports"><div class="loading">加载日报列表...</div></div></div>';
  }

  mc.innerHTML=h;

  // Render charts
  requestAnimationFrame(()=>{
    if(days.length)makeTripleCharts('grp',days,g.targetAcos||20);
    camps.forEach(([cid,c])=>{
      const el=document.getElementById('camp-spark-'+cid);
      if(el&&c.days)makeSparkline(el,c.days.map(d=>d.orders),'#3b82f6');
    });
  });

  // Load daily reports
  if(dates.length) loadDailyReports(gid,dates);
}

async function loadDailyReports(gid,dates){
  const container=document.getElementById('dailyReports');
  if(!container)return;
  // Load meta for available dates (limit to latest 14)
  const showDates=dates.slice(0,14);
  const metas=await Promise.all(showDates.map(d=>loadMeta(gid,d)));
  let h='';
  showDates.forEach((date,i)=>{
    const m=metas[i];
    h+='<div class="daily-entry">';
    h+='<div class="de-header">';
    h+='<div class="de-date">📅 '+date+'</div>';
    if(m){
      h+='<div class="de-stats">';
      h+='<span>订单: <strong>'+m.orders+'</strong></span>';
      h+='<span>花费: <strong>'+fmtD(m.spend)+'</strong></span>';
      h+='<span>ACOS: '+acosBadge(m.acos)+'</span>';
      if(m.actions_total){h+='<span>操作: <strong>'+m.actions_total+'</strong></span>';}
      h+='</div>';
    } else {
      h+='<div class="de-stats"><span style="color:var(--text2)">暂无详细数据</span></div>';
    }
    h+='</div>';
    // Buttons
    if(m&&m.files){
      const f=m.files;
      h+='<div class="de-actions">';
      h+=f.search_term_report?'<button class="de-btn" onclick="openReport(\''+gid+'\',\''+date+'\',\''+f.search_term_report+'\')">🔍 搜索词报告</button>':'<button class="de-btn disabled">🔍 搜索词报告</button>';
      h+=f.analysis?'<button class="de-btn" onclick="openReport(\''+gid+'\',\''+date+'\',\''+f.analysis+'\')">📊 分析报告</button>':'<button class="de-btn disabled">📊 分析报告</button>';
      h+=f.playbook?'<button class="de-btn" onclick="openReport(\''+gid+'\',\''+date+'\',\''+f.playbook+'\')">📋 执行手册</button>':'<button class="de-btn disabled">📋 执行手册</button>';
      h+=f.actions_result?'<button class="de-btn" onclick="openActions(\''+gid+'\',\''+date+'\',\''+f.actions_result+'\')">✅ 执行结果</button>':'<button class="de-btn disabled">✅ 执行结果</button>';
      h+='</div>';
    }
    h+='</div>';
  });
  if(!h)h='<div class="no-data"><div class="icon">📭</div><div class="title">暂无日报数据</div></div>';
  container.innerHTML=h;
}

// ===== MODAL =====
function openModal(html){
  document.getElementById('modalBody').innerHTML=html;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('modal').addEventListener('click',function(e){
  if(e.target===this)closeModal();
});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closeModal();
});

async function openReport(gid,date,file){
  openModal('<div class="loading">加载报告中...</div>');
  try{
    const r=await fetch('data/'+gid+'/daily/'+date+'/'+file+'?t='+Date.now());
    if(!r.ok)throw new Error('Not found');
    const md=await r.text();
    openModal(marked.parse(md));
  }catch(e){
    openModal('<div class="no-data"><div class="icon">❌</div><div class="title">加载失败</div><div class="desc">'+esc(e.message)+'</div></div>');
  }
}

async function openActions(gid,date,file){
  openModal('<div class="loading">加载执行结果...</div>');
  try{
    const r=await fetch('data/'+gid+'/daily/'+date+'/'+file+'?t='+Date.now());
    if(!r.ok)throw new Error('Not found');
    const data=await r.json();
    const actions=data.actions||[];
    if(!actions.length){openModal('<div class="no-data"><div class="icon">📭</div><div class="title">暂无执行操作</div></div>');return;}
    let h='<h2 style="margin-bottom:16px;">🎯 执行结果 — '+date+'</h2>';
    // Summary
    h+='<div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;">';
    h+='<div style="font-size:14px;"><strong>'+actions.length+'</strong> 项操作</div>';
    h+='</div>';
    // Table
    h+='<table style="width:100%;border-collapse:collapse;font-size:13px;">';
    h+='<tr><th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);color:var(--text2);">#</th>';
    h+='<th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);color:var(--text2);">类型</th>';
    h+='<th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);color:var(--text2);">目标</th>';
    h+='<th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);color:var(--text2);">优先级</th>';
    h+='<th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);color:var(--text2);">原因</th></tr>';
    const typeLabels={'bidDown':'⬇️ 降竞价','bidUp':'⬆️ 提竞价','budget':'📊 预算','negative':'🚫 否定词','newKeyword':'🆕 新增词','pause':'⏸️ 暂停','budgetUp':'📈 加预算','budgetDown':'📉 降预算'};
    actions.forEach((a,i)=>{
      const tl=typeLabels[a.type]||a.type;
      let target=a.keyword||a.campaignId||'';
      if(a.negativeKeywords&&a.negativeKeywords.length){target=a.negativeKeywords.map(n=>n.keyword).join(', ');}
      h+='<tr><td style="padding:8px;border-bottom:1px solid rgba(255,255,255,.04);">'+(i+1)+'</td>';
      h+='<td style="padding:8px;border-bottom:1px solid rgba(255,255,255,.04);">'+tl+'</td>';
      h+='<td style="padding:8px;border-bottom:1px solid rgba(255,255,255,.04);max-width:200px;word-break:break-all;">'+esc(target)+'</td>';
      h+='<td style="padding:8px;border-bottom:1px solid rgba(255,255,255,.04);">'+(a.priority||'—')+'</td>';
      h+='<td style="padding:8px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;color:var(--text2);max-width:300px;">'+esc(a.reason||'')+'</td></tr>';
    });
    h+='</table>';
    openModal(h);
  }catch(e){
    openModal('<div class="no-data"><div class="icon">❌</div><div class="title">加载失败</div><div class="desc">'+esc(e.message)+'</div></div>');
  }
}

// ===== TAB SWITCHING =====
function switchToAll(){
  currentTab='all';
  renderGroupTabs();
  renderAllTab();
  history.replaceState(null,'','#all');
}
function switchToGroup(gid){
  currentTab=gid;
  renderGroupTabs();
  renderGroupTab(gid);
  history.replaceState(null,'','#'+gid);
}

// ===== INIT =====
async function init(){
  await loadGroups();
  if(!groups.length){
    renderGroupTabs();
    document.getElementById('mainContent').innerHTML='<div class="no-data"><div class="icon">📭</div><div class="title">暂无托管组</div><div class="desc">请先 <a href="config.html" style="color:var(--accent);">配置托管组</a></div></div>';
    return;
  }
  const hash=location.hash.replace('#','');
  if(hash&&hash!=='all'&&groups.find(g=>g.id===hash)){
    currentTab=hash;
    renderGroupTabs();
    renderGroupTab(hash);
  } else {
    currentTab='all';
    renderGroupTabs();
    renderAllTab();
  }
}
init();
</script>

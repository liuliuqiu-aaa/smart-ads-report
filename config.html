<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能托管广告 - 托管组配置</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
    --text: #e1e4ed; --text2: #8b8fa3; --accent: #6366f1;
    --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
    --blue: #3b82f6; --orange: #f97316;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }

  .header { background:linear-gradient(135deg,#1e1b4b,#312e81); padding:24px 32px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .header h1 { font-size:22px; font-weight:600; }
  .header .subtitle { color:var(--text2); font-size:14px; margin-top:4px; }
  .header .actions { display:flex; gap:10px; }

  .btn { padding:8px 16px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; transition:all .2s; }
  .btn-accent { background:var(--accent); color:#fff; }
  .btn-accent:hover { background:#5558e6; }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text2); }
  .btn-outline:hover { background:rgba(255,255,255,.05); color:var(--text); }
  .btn-green { background:var(--green); color:#fff; }
  .btn-green:hover { background:#1db954; }
  .btn-red { background:rgba(239,68,68,.15); color:var(--red); border:none; }
  .btn-red:hover { background:rgba(239,68,68,.25); }
  .btn-sm { padding:5px 12px; font-size:12px; }

  .container { max-width:1200px; margin:0 auto; padding:24px 32px; }

  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:24px; }
  .stat-box { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
  .stat-box .label { font-size:12px; color:var(--text2); }
  .stat-box .value { font-size:26px; font-weight:700; margin-top:4px; }
  .stat-box .value.v-accent { color:var(--accent); }
  .stat-box .value.v-green { color:var(--green); }
  .stat-box .value.v-yellow { color:var(--yellow); }

  /* Save status */
  .save-status { font-size:12px; padding:4px 12px; border-radius:12px; display:inline-flex; align-items:center; gap:4px; }
  .save-status.saved { background:rgba(34,197,94,.12); color:var(--green); }
  .save-status.saving { background:rgba(245,158,11,.12); color:var(--yellow); }

  /* Group Card */
  .group-card { background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:16px; overflow:hidden; transition:border-color .2s; }
  .group-card:hover { border-color:rgba(99,102,241,.3); }
  .group-header { padding:16px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
  .group-header .left { display:flex; align-items:center; gap:10px; }
  .group-name { font-size:16px; font-weight:600; }
  .group-id { font-size:11px; color:var(--text2); background:rgba(255,255,255,.05); padding:2px 8px; border-radius:4px; font-family:monospace; }
  .badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600; }
  .badge-on { background:rgba(34,197,94,.15); color:var(--green); }
  .badge-off { background:rgba(239,68,68,.15); color:var(--red); }

  .group-body { padding:16px 20px; }
  .group-meta { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:16px; }
  .meta-item .k { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
  .meta-item .v { font-size:14px; font-weight:500; margin-top:2px; }
  .meta-item .v a { color:var(--accent); text-decoration:none; }
  .meta-item .v a:hover { text-decoration:underline; }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:8px 12px; background:rgba(255,255,255,.03); color:var(--text2); font-weight:500; font-size:12px; border-bottom:1px solid var(--border); }
  td { padding:8px 12px; border-bottom:1px solid rgba(255,255,255,.03); }
  tr:last-child td { border-bottom:none; }
  .mono { font-family:'SF Mono',Monaco,monospace; font-size:12px; color:var(--text2); }
  .campaign-type { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:500; }
  .t-auto { background:rgba(59,130,246,.15); color:var(--blue); }
  .t-manual-keyword { background:rgba(245,158,11,.15); color:var(--yellow); }
  .t-product-targeting { background:rgba(34,197,94,.15); color:var(--green); }
  .t-category-targeting { background:rgba(249,115,22,.15); color:var(--orange); }
  .t-other { background:rgba(139,143,163,.15); color:var(--text2); }

  .group-footer { padding:12px 20px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }

  /* Modal */
  .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); z-index:100; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
  .modal-overlay.active { display:flex; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:14px; width:700px; max-height:90vh; overflow-y:auto; box-shadow:0 16px 48px rgba(0,0,0,.4); }
  .modal-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .modal-header h2 { font-size:18px; }
  .modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--text2); padding:4px 8px; }
  .modal-close:hover { color:var(--text); }
  .modal-body { padding:24px; }
  .modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }

  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:13px; font-weight:500; color:var(--text2); margin-bottom:6px; }
  .form-group .hint { font-size:11px; color:var(--text2); margin-top:3px; opacity:.7; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
  .form-row-4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:16px; }
  .section-title { font-size:13px; font-weight:600; color:var(--text2); letter-spacing:.5px; text-transform:uppercase; margin:20px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }

  input[type="text"], input[type="number"], input[type="url"], select, textarea {
    width:100%; padding:9px 12px; background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:6px;
    font-size:14px; color:var(--text); transition:border .2s;
  }
  input:focus, select:focus, textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(99,102,241,.2); }
  input::placeholder, textarea::placeholder { color:rgba(139,143,163,.5); }
  textarea { resize:vertical; min-height:50px; }
  select { appearance:none; }
  select option { background:var(--card); color:var(--text); }

  .campaign-input-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
  .campaign-input-row input { flex:1; font-family:monospace; }
  .campaign-input-row .remove-btn { background:none; border:none; color:var(--red); cursor:pointer; font-size:18px; padding:4px 8px; opacity:.6; }
  .campaign-input-row .remove-btn:hover { opacity:1; }

  .switch { position:relative; display:inline-block; width:40px; height:22px; }
  .switch input { opacity:0; width:0; height:0; }
  .switch .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:rgba(255,255,255,.15); border-radius:22px; transition:.3s; }
  .switch .slider:before { content:''; position:absolute; height:16px; width:16px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.3s; }
  .switch input:checked + .slider { background:var(--green); }
  .switch input:checked + .slider:before { transform:translateX(18px); }

  .empty-state { text-align:center; padding:60px 20px; color:var(--text2); }
  .empty-state .icon { font-size:48px; margin-bottom:12px; }

  /* Import modal */
  .import-textarea { font-family:'SF Mono',Monaco,monospace; font-size:12px; background:rgba(0,0,0,.3); min-height:300px; }

  /* Nav link to reports */
  .nav-link { color:var(--text2); text-decoration:none; font-size:13px; display:inline-flex; align-items:center; gap:4px; }
  .nav-link:hover { color:var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🎯 智能托管广告 — 托管组配置</h1>
    <div class="subtitle">
      <a href="index.html" class="nav-link">← 返回报告中心</a>
      <span style="margin:0 8px;color:var(--border);">|</span>
      <span class="save-status saved" id="saveStatus">✓ 已保存</span>
    </div>
  </div>
  <div class="actions">
    <button class="btn btn-outline" onclick="openImportModal()">📥 导入</button>
    <button class="btn btn-accent" onclick="openAddGroupModal()">＋ 新增托管组</button>
  </div>
</div>

<div class="container">
  <div class="stat-grid">
    <div class="stat-box"><div class="label">托管组总数</div><div class="value v-accent" id="stat-total">0</div></div>
    <div class="stat-box"><div class="label">已启用</div><div class="value v-green" id="stat-enabled">0</div></div>
    <div class="stat-box"><div class="label">已禁用</div><div class="value" id="stat-disabled" style="color:var(--text2)">0</div></div>
    <div class="stat-box"><div class="label">广告活动总数</div><div class="value v-yellow" id="stat-campaigns">0</div></div>
  </div>
  <div id="groups-container"></div>
</div>

<!-- Add/Edit Group Modal -->
<div class="modal-overlay" id="groupModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">新增托管组</h2>
      <button class="modal-close" onclick="closeModal('groupModal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editingGroupId">

      <input type="hidden" id="groupId">
      <div class="form-group">
        <label>托管组名称 *</label>
        <input type="text" id="groupName" placeholder="如：COOFANDY Hoodie 核心推广">
      </div>

      <div class="form-group" style="display:flex;align-items:center;gap:12px;">
        <label style="margin:0;">启用</label>
        <label class="switch"><input type="checkbox" id="groupEnabled" checked><span class="slider"></span></label>
      </div>

      <div class="section-title">📦 商品信息</div>

      <div class="form-row">
        <div class="form-group">
          <label>商品名称</label>
          <input type="text" id="productName" placeholder="如：COOFANDY Men Casual Hoodie">
        </div>
        <div class="form-group">
          <label>SPU</label>
          <input type="text" id="productSpu" placeholder="如：AMJ010095">
        </div>
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label>代表 ASIN</label>
          <input type="text" id="productAsin" placeholder="如：B0FCYLJH34">
        </div>
        <div class="form-group">
          <label>售价 ($)</label>
          <input type="number" id="productPrice" step="0.01" placeholder="17.99">
        </div>
        <div class="form-group">
          <label>产品阶段</label>
          <select id="productStage">
            <option value="launch">新品期</option>
            <option value="growth" selected>成长期</option>
            <option value="mature">成熟期</option>
            <option value="decline">衰退期</option>
          </select>
        </div>
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label>账号</label>
          <input type="text" id="productAccount" placeholder="如：AM00147">
        </div>
        <div class="form-group">
          <label>站点</label>
          <select id="productSite">
            <option value="US">US 美国</option>
            <option value="UK">UK 英国</option>
            <option value="DE">DE 德国</option>
            <option value="JP">JP 日本</option>
            <option value="CA">CA 加拿大</option>
            <option value="FR">FR 法国</option>
            <option value="IT">IT 意大利</option>
            <option value="ES">ES 西班牙</option>
            <option value="AU">AU 澳洲</option>
          </select>
        </div>
        <div class="form-group">
          <label>亚马逊商品链接</label>
          <input type="url" id="productUrl" placeholder="https://www.amazon.com/dp/...">
        </div>
      </div>

      <div class="section-title">🎯 优化目标</div>
      <div class="form-group">
        <label>宏观目标</label>
        <select id="macroGoal">
          <option value="expand-traffic">🚀 拓展流量 — 验证/打开市场，快速获取流量积累权重</option>
          <option value="boost-sales" selected>📈 扩大销量·推动增长 — 高效转化，提升销量和市场份额</option>
          <option value="surge-sales">⚡ 扩大销量·冲量增长 — 大促收割，效率可适当放宽</option>
          <option value="steady-optimize">⚖️ 稳定增效 — 精细化运营，控制成本提升利润</option>
          <option value="clearance">📦 清仓回收 — 快速清理库存，回笼资金</option>
        </select>
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label>目标 ACOS (%)</label>
          <input type="number" id="targetAcos" value="20" step="1">
        </div>
        <div class="form-group">
          <label>日预算上限 ($)</label>
          <input type="number" id="budgetLimit" value="300" step="1">
        </div>
        <div class="form-group">
          <label>竞价上限 ($)</label>
          <input type="number" id="bidLimit" value="2" step="0.1">
        </div>
      </div>

      <div class="section-title">📊 广告活动 <span style="font-weight:400;font-size:11px;color:var(--text2);text-transform:none;letter-spacing:0;">（只需填写活动 ID，其他信息自动获取）</span></div>
      <div id="campaignsEditor"></div>
      <button class="btn btn-outline btn-sm" onclick="addCampaignRow()" style="margin-top:8px;">＋ 添加广告活动</button>

      <div class="section-title" style="margin-top:24px;">💬 备注</div>
      <div class="form-group">
        <textarea id="groupNotes" placeholder="可选备注信息" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('groupModal')">取消</button>
      <button class="btn btn-green" onclick="saveGroup()">保存</button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-header">
      <h2>导入配置</h2>
      <button class="modal-close" onclick="closeModal('importModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>粘贴 JSON 配置</label>
        <textarea id="importJson" class="import-textarea" placeholder='粘贴 groups.json 内容...'></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('importModal')">取消</button>
      <button class="btn btn-green" onclick="importConfig()">导入</button>
    </div>
  </div>
</div>

<script>
let config = { version: 2, updatedAt: '', groups: [] };

const TYPES = {
  'manual-keyword': '手动关键词',
  'auto': '自动投放',
  'product-targeting': '商品投放',
  'category-targeting': '品类投放',
  'brand': '品牌推广',
  'other': '其他'
};
const STAGES = { launch:'新品期', growth:'成长期', mature:'成熟期', decline:'衰退期' };
const GOALS = {
  'expand-traffic': { icon:'🚀', label:'拓展流量', color:'var(--blue)' },
  'boost-sales': { icon:'📈', label:'扩大销量·推动增长', color:'var(--green)' },
  'surge-sales': { icon:'⚡', label:'扩大销量·冲量增长', color:'var(--orange)' },
  'steady-optimize': { icon:'⚖️', label:'稳定增效', color:'var(--accent)' },
  'clearance': { icon:'📦', label:'清仓回收', color:'var(--yellow)' }
};

function init() {
  const saved = localStorage.getItem('smart-ads-groups-v2');
  if (saved) try { config = JSON.parse(saved); } catch(e) {}
  if (window.__CONFIG__) config = window.__CONFIG__;
  render();
}

function save() {
  config.updatedAt = new Date().toISOString();
  localStorage.setItem('smart-ads-groups-v2', JSON.stringify(config));
  // Signal for external pickup
  document.title = 'CONFIG_UPDATED:' + Date.now();
  setTimeout(() => { document.title = '智能托管广告 - 托管组配置'; }, 500);
  showSaveStatus();
  render();
}

function showSaveStatus() {
  const el = document.getElementById('saveStatus');
  el.className = 'save-status saving';
  el.textContent = '⏳ 保存中...';
  setTimeout(() => {
    el.className = 'save-status saved';
    el.textContent = '✓ 已保存';
  }, 600);
}

function render() {
  const c = document.getElementById('groups-container');
  const gs = config.groups || [];
  document.getElementById('stat-total').textContent = gs.length;
  document.getElementById('stat-enabled').textContent = gs.filter(g=>g.enabled).length;
  document.getElementById('stat-disabled').textContent = gs.filter(g=>!g.enabled).length;
  document.getElementById('stat-campaigns').textContent = gs.reduce((s,g)=>s+(g.campaignIds?.length||0),0);

  if (!gs.length) {
    c.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p style="font-size:14px;">暂无托管组，点击右上角「新增托管组」开始配置</p></div>';
    return;
  }

  c.innerHTML = gs.map(g => {
    const site = g.product?.site || 'US';
    const acct = g.product?.account || '-';
    const url = g.product?.amazonUrl;
    const goal = GOALS[g.macroGoal] || GOALS['boost-sales'];
    const createdStr = g.createdAt ? new Date(g.createdAt).toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'}) : '-';
    return `
    <div class="group-card">
      <div class="group-header">
        <div class="left">
          <span class="group-name">${h(g.name)}</span>
          <span class="badge ${g.enabled?'badge-on':'badge-off'}">${g.enabled?'已启用':'已禁用'}</span>
          <span style="font-size:11px;color:${goal.color};background:rgba(255,255,255,.05);padding:2px 8px;border-radius:4px;">${goal.icon} ${goal.label}</span>
          <span style="font-size:11px;color:var(--text2);">📅 ${createdStr}</span>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-outline btn-sm" onclick="editGroup('${g.id}')">✏️ 编辑</button>
          <button class="btn btn-outline btn-sm" onclick="duplicateGroup('${g.id}')">📋 复制</button>
          <button class="btn btn-red btn-sm" onclick="deleteGroup('${g.id}')">删除</button>
        </div>
      </div>
      <div class="group-body">
        <div class="group-meta">
          <div class="meta-item"><div class="k">商品</div><div class="v">${h(g.product?.name||'-')}</div></div>
          <div class="meta-item"><div class="k">代表 ASIN</div><div class="v">${url?`<a href="${h(url)}" target="_blank">${h(g.product?.asin||'-')}</a>`:h(g.product?.asin||'-')}</div></div>
          <div class="meta-item"><div class="k">SPU</div><div class="v">${h(g.product?.spu||'-')}</div></div>
          <div class="meta-item"><div class="k">账号 / 站点</div><div class="v">${h(acct)} / ${h(site)}</div></div>
          <div class="meta-item"><div class="k">售价</div><div class="v">${g.product?.price?'$'+g.product.price:'-'}</div></div>
          <div class="meta-item"><div class="k">目标 ACOS</div><div class="v">≤ ${g.targetAcos||20}%</div></div>
          <div class="meta-item"><div class="k">预算上限</div><div class="v">$${g.budgetLimit||300}/天</div></div>
          <div class="meta-item"><div class="k">竞价上限</div><div class="v">$${g.bidLimit||2}</div></div>
        </div>
        <table>
          <thead><tr><th style="width:60px">#</th><th>广告活动 ID</th></tr></thead>
          <tbody>
            ${(g.campaignIds||[]).map((cid,i) => `<tr><td>${i+1}</td><td class="mono">${h(cid)}</td></tr>`).join('')}
            ${(g.campaignIds||[]).length===0?'<tr><td colspan="2" style="text-align:center;color:var(--text2);">暂无广告活动</td></tr>':''}
          </tbody>
        </table>
      </div>
      ${g.notes?`<div class="group-footer" style="font-size:12px;color:var(--text2);">💬 ${h(g.notes)}</div>`:''}
    </div>`;
  }).join('');
}

function h(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

let campaignIds = [];

function renderCampaignEditor() {
  document.getElementById('campaignsEditor').innerHTML = campaignIds.map((cid,i) => `
    <div class="campaign-input-row">
      <input type="text" placeholder="广告活动 ID（如 333903452360072）" value="${h(cid)}" onchange="campaignIds[${i}]=this.value.trim()" style="font-size:13px;">
      <button class="remove-btn" onclick="campaignIds.splice(${i},1);renderCampaignEditor();">✕</button>
    </div>
  `).join('');
}

function addCampaignRow(val) {
  campaignIds.push(val || '');
  renderCampaignEditor();
}

function openAddGroupModal() {
  document.getElementById('modalTitle').textContent = '新增托管组';
  document.getElementById('editingGroupId').value = '';
  ['groupName','groupId','productName','productSpu','productAsin','productPrice','productAccount','productUrl','groupNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('groupEnabled').checked = true;
  document.getElementById('macroGoal').value = 'boost-sales';
  document.getElementById('targetAcos').value = '20';
  document.getElementById('budgetLimit').value = '300';
  document.getElementById('bidLimit').value = '2';
  document.getElementById('productSite').value = 'US';
  document.getElementById('productStage').value = 'growth';
  campaignIds = [''];
  renderCampaignEditor();
  openModal('groupModal');
}

function editGroup(id) {
  const g = config.groups.find(x=>x.id===id);
  if (!g) return;
  document.getElementById('modalTitle').textContent = '编辑托管组';
  document.getElementById('editingGroupId').value = id;
  document.getElementById('groupName').value = g.name||'';
  document.getElementById('groupId').value = g.id||'';
  document.getElementById('groupEnabled').checked = g.enabled!==false;
  document.getElementById('productName').value = g.product?.name||'';
  document.getElementById('productSpu').value = g.product?.spu||'';
  document.getElementById('productAsin').value = g.product?.asin||'';
  document.getElementById('productPrice').value = g.product?.price||'';
  document.getElementById('productAccount').value = g.product?.account||'';
  document.getElementById('productSite').value = g.product?.site||'US';
  document.getElementById('productStage').value = g.product?.stage||'growth';
  document.getElementById('productUrl').value = g.product?.amazonUrl||'';
  document.getElementById('macroGoal').value = g.macroGoal||'boost-sales';
  document.getElementById('targetAcos').value = g.targetAcos||20;
  document.getElementById('budgetLimit').value = g.budgetLimit||300;
  document.getElementById('bidLimit').value = g.bidLimit||2;
  document.getElementById('groupNotes').value = g.notes||'';
  campaignIds = [...(g.campaignIds||[])];
  if (!campaignIds.length) campaignIds = [''];
  renderCampaignEditor();
  openModal('groupModal');
}

function saveGroup() {
  const editId = document.getElementById('editingGroupId').value;
  const name = document.getElementById('groupName').value.trim();
  if (!name) { alert('请填写托管组名称'); return; }
  let id = editId || document.getElementById('groupId').value.trim();
  if (!id) {
    id = 'group-' + Date.now().toString(36) + '-' + Math.random().toString(36).substring(2,6);
  }
  if (!editId && config.groups.some(g=>g.id===id)) {
    id = id + '-' + Math.random().toString(36).substring(2,5);
  }

  const ids = campaignIds.map(s=>s.trim()).filter(Boolean);
  const group = {
    id, name,
    enabled: document.getElementById('groupEnabled').checked,
    product: {
      name: document.getElementById('productName').value.trim(),
      spu: document.getElementById('productSpu').value.trim(),
      asin: document.getElementById('productAsin').value.trim().toUpperCase(),
      price: parseFloat(document.getElementById('productPrice').value)||0,
      account: document.getElementById('productAccount').value.trim(),
      site: document.getElementById('productSite').value,
      stage: document.getElementById('productStage').value,
      amazonUrl: document.getElementById('productUrl').value.trim()
    },
    macroGoal: document.getElementById('macroGoal').value,
    targetAcos: parseInt(document.getElementById('targetAcos').value)||20,
    budgetLimit: parseInt(document.getElementById('budgetLimit').value)||300,
    bidLimit: parseFloat(document.getElementById('bidLimit').value)||2,
    campaignIds: ids,
    notes: document.getElementById('groupNotes').value.trim()
  };

  if (editId) {
    const idx = config.groups.findIndex(g=>g.id===editId);
    if (idx>=0) { group.createdAt = config.groups[idx].createdAt; config.groups[idx] = group; }
  } else {
    group.createdAt = new Date().toISOString();
    config.groups.push(group);
  }
  save();
  closeModal('groupModal');
}

function deleteGroup(id) {
  const g = config.groups.find(x=>x.id===id);
  if (!g || !confirm(`确认删除托管组「${g.name}」？`)) return;
  config.groups = config.groups.filter(x=>x.id!==id);
  save();
}

function duplicateGroup(id) {
  const g = config.groups.find(x=>x.id===id);
  if (!g) return;
  const c = JSON.parse(JSON.stringify(g));
  c.id = g.id+'-copy'; c.name = g.name+' (副本)'; c.createdAt = new Date().toISOString();
  config.groups.push(c);
  save();
}

function openImportModal() {
  document.getElementById('importJson').value = '';
  openModal('importModal');
}

function importConfig() {
  try {
    const d = JSON.parse(document.getElementById('importJson').value);
    if (d.groups && Array.isArray(d.groups)) {
      config = d;
      save();
      closeModal('importModal');
      alert('导入成功：' + d.groups.length + ' 个托管组');
    } else { alert('JSON 需包含 groups 数组'); }
  } catch(e) { alert('JSON 解析失败：' + e.message); }
}

// ID is auto-generated, no manual input needed

// External API: read config via JS evaluate
window.getConfig = () => JSON.stringify(config);

init();
</script>
</body>
</html>

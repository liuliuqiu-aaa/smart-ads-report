<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能广告托管周报</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{--bg:#0f1117;--card:#1a1d28;--border:#2a2d3a;--text:#e1e4ed;--muted:#8b8fa3;--accent:#6c5ce7;--green:#00b894;--red:#ff7675;--blue:#74b9ff}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.7}
.container{max-width:1100px;margin:0 auto;padding:20px}
header{text-align:center;padding:40px 0 20px;border-bottom:1px solid var(--border);margin-bottom:30px}
header h1{font-size:1.8em;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--muted);margin-top:8px}
.charts-section{margin:40px 0}
.charts-section h2{font-size:1.3em;color:var(--accent);margin-bottom:20px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(480px,1fr));gap:24px;margin-bottom:30px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.chart-card h3{font-size:0.95em;color:var(--muted);margin-bottom:12px}
.chart-card canvas{width:100%!important;max-height:320px}
.report-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:30px 36px;margin-top:30px}
.report-section h1{font-size:1.5em;color:var(--text);margin:24px 0 12px;border-bottom:1px solid var(--border);padding-bottom:8px}
.report-section h2{font-size:1.25em;color:var(--accent);margin:28px 0 12px}
.report-section h3{font-size:1.1em;color:var(--blue);margin:20px 0 10px}
.report-section h4{font-size:1em;color:var(--green);margin:16px 0 8px}
.report-section p{margin:8px 0;color:var(--text)}
.report-section blockquote{border-left:3px solid var(--accent);padding:8px 16px;margin:12px 0;background:rgba(108,92,231,0.08);border-radius:0 8px 8px 0;color:var(--muted)}
.report-section table{width:100%;border-collapse:collapse;margin:12px 0;font-size:0.88em;overflow-x:auto;display:block}
.report-section th,.report-section td{padding:8px 12px;border:1px solid var(--border);text-align:left;white-space:nowrap}
.report-section th{background:rgba(108,92,231,0.15);color:var(--accent);font-weight:600}
.report-section tr:nth-child(even){background:rgba(255,255,255,0.02)}
.report-section ul,.report-section ol{padding-left:24px;margin:8px 0}
.report-section li{margin:4px 0}
.report-section strong{color:#fff}
.report-section hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.report-section code{background:rgba(108,92,231,0.15);padding:2px 6px;border-radius:4px;font-size:0.9em}
.loading{text-align:center;padding:60px;color:var(--muted)}
@media(max-width:600px){.container{padding:12px}.chart-grid{grid-template-columns:1fr}.report-section{padding:16px 18px}.report-section table{font-size:0.78em}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📊 智能广告托管周报</h1>
    <p id="date-range">加载中...</p>
  </header>
  <section class="charts-section">
    <h2>📈 趋势图表</h2>
    <div class="chart-grid" id="chart-grid">
      <div class="loading">加载图表数据...</div>
    </div>
  </section>
  <section class="report-section" id="report-content">
    <div class="loading">加载报告内容...</div>
  </section>
</div>
<script>
const defaultDate='2026-03-16';
const date=location.hash.replace('#','')||defaultDate;
document.getElementById('date-range').textContent=`报告日期: ${date}`;

const chartColors={line:{tension:0.3,pointRadius:4,pointHoverRadius:6,borderWidth:2.5,fill:false},bar:{borderRadius:4}};

async function loadCharts(){
  try{
    const r=await fetch(`data/weekly/charts-${date}.json`);
    const d=await r.json();
    const grid=document.getElementById('chart-grid');
    grid.innerHTML='';
    d.charts.forEach(c=>{
      const card=document.createElement('div');
      card.className='chart-card';
      card.innerHTML=`<h3>${c.title}</h3><canvas id="${c.id}"></canvas>`;
      grid.appendChild(card);
      const ctx=card.querySelector('canvas').getContext('2d');
      const datasets=c.datasets.map(ds=>{
        const base={...ds};
        if(c.type==='line'){Object.assign(base,chartColors.line);if(!base.fill)base.fill=false}
        if(c.type==='bar')Object.assign(base,chartColors.bar);
        return base;
      });
      const scales={x:{ticks:{color:'#8b8fa3'},grid:{color:'rgba(255,255,255,0.05)'}},y:{ticks:{color:'#8b8fa3'},grid:{color:'rgba(255,255,255,0.05)'}}};
      if(c.options&&c.options.scales){
        if(c.options.scales.y&&c.options.scales.y.title)scales.y.title=c.options.scales.y.title;
        if(c.options.scales.y1){scales.y1={...c.options.scales.y1,ticks:{color:'#8b8fa3'},grid:{drawOnChartArea:false}}}
      }
      new Chart(ctx,{type:c.type,data:{labels:c.labels,datasets},options:{responsive:true,plugins:{legend:{labels:{color:'#e1e4ed',padding:12}}},scales,spanGaps:true}});
    });
  }catch(e){document.getElementById('chart-grid').innerHTML=`<div class="loading">图表加载失败: ${e.message}</div>`}
}

async function loadReport(){
  try{
    const r=await fetch(`data/weekly/report-${date}.md`);
    if(!r.ok){
      const r2=await fetch(`../data/weekly-reports/report-${date}.md`);
      var text=await r2.text();
    }else{var text=await r.text()}
    document.getElementById('report-content').innerHTML=marked.parse(text);
  }catch(e){document.getElementById('report-content').innerHTML=`<div class="loading">报告加载失败: ${e.message}</div>`}
}

loadCharts();loadReport();
window.addEventListener('hashchange',()=>location.reload());
</script>
</body>
</html>

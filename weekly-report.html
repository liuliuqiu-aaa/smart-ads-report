<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能托管广告 - 周报分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
  --border: #30363d; --text: #e6edf3; --text2: #8b949e;
  --accent: #58a6ff; --green: #3fb950; --red: #f85149; --orange: #d29922;
  --phase-before: rgba(139, 148, 158, 0.08);
  --phase-offline: rgba(88, 166, 255, 0.08);
  --phase-online: rgba(63, 185, 80, 0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; }
.container { max-width: 1400px; margin: 0 auto; padding: 16px; }

/* Top nav */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; height: 44px; gap: 16px; }
.topbar .logo { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; }
.topbar .nav-link { color: var(--text2); text-decoration: none; font-size: 13px; padding: 4px 10px; border-radius: 4px; transition: all .2s; }
.topbar .nav-link:hover { color: var(--text); background: rgba(255,255,255,.05); }
.topbar .nav-link.active { color: var(--accent); background: rgba(99,102,241,.1); }

/* Week selector header */
.week-header { background: linear-gradient(135deg, #1e1b4b, #312e81); padding: 16px 32px; }
.week-header h2 { font-size: 20px; font-weight: 600; margin-bottom: 10px; }
.week-header .week-selector { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.week-header select { background: rgba(255,255,255,0.1); color: var(--text); border: 1px solid rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
.week-header select:focus { outline: none; border-color: var(--accent); }
.week-header .week-info { color: var(--text2); font-size: 13px; }

/* Main Tabs */
.main-tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
.main-tab { padding: 10px 20px; background: transparent; border: none; border-radius: 6px 6px 0 0; cursor: pointer; color: var(--text2); font-size: 14px; font-weight: 500; transition: all 0.2s; }
.main-tab:hover { color: var(--text); background: var(--surface); }
.main-tab.active { color: var(--accent); background: var(--surface); border-bottom: 2px solid var(--accent); }

/* Tab panels */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* KPI Cards */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.kpi-card h4 { color: var(--accent); font-size: 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.kpi-card h4::before { content: ''; width: 4px; height: 16px; background: var(--accent); border-radius: 2px; }
.kpi-metrics { display: flex; flex-direction: column; gap: 12px; }
.kpi-metric { display: flex; justify-content: space-between; align-items: center; }
.kpi-metric .label { color: var(--text2); font-size: 13px; }
.kpi-metric .value { font-size: 18px; font-weight: 600; color: var(--text); }
.kpi-metric .change { font-size: 12px; padding: 2px 8px; border-radius: 4px; margin-left: 8px; }
.kpi-metric .change.positive { background: rgba(63,185,80,0.15); color: var(--green); }
.kpi-metric .change.negative { background: rgba(248,81,73,0.15); color: var(--red); }
.kpi-metric .change.neutral { background: rgba(139,148,158,0.15); color: var(--text2); }

/* Charts */
.charts-section { margin-bottom: 32px; }
.charts-section h3 { color: var(--text); font-size: 16px; margin-bottom: 16px; padding-left: 12px; border-left: 3px solid var(--accent); }
.charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.chart-card.full { grid-column: 1 / -1; }
.chart-card h4 { font-size: 14px; color: var(--text2); margin-bottom: 16px; }
.chart-wrap { position: relative; width: 100%; height: 300px; }

/* Group selector (for detail tabs) */
.detail-layout { display: grid; grid-template-columns: 240px 1fr; gap: 20px; }
@media (max-width: 900px) { .detail-layout { grid-template-columns: 1fr; } }
.group-list { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; max-height: 600px; overflow-y: auto; }
.group-list h4 { color: var(--text2); font-size: 13px; margin-bottom: 12px; padding: 0 8px; }
.group-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--text2); font-size: 13px; transition: all 0.2s; margin-bottom: 4px; }
.group-item:hover { background: var(--surface2); color: var(--text); }
.group-item.active { background: var(--accent); color: #fff; }
.group-item .group-spu { font-weight: 600; }
.group-item .group-meta { font-size: 11px; opacity: 0.7; margin-top: 2px; }
.group-detail { flex: 1; }

/* Phase comparison table */
.phase-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px; }
.phase-table th, .phase-table td { padding: 10px 12px; border: 1px solid var(--border); text-align: right; }
.phase-table th { background: var(--surface2); color: var(--accent); text-align: left; }
.phase-table th:first-child { text-align: left; }
.phase-table td:first-child { text-align: left; color: var(--text2); }
.phase-table tr:hover { background: var(--surface2); }

/* Markdown report */
.report-content { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
.report-content h1 { color: var(--accent); font-size: 1.4em; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 16px; }
.report-content h2 { color: var(--green); font-size: 1.2em; margin-top: 24px; margin-bottom: 12px; }
.report-content h3 { color: var(--orange); font-size: 1.05em; margin-top: 20px; margin-bottom: 8px; }
.report-content table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.85em; overflow-x: auto; display: block; }
.report-content th, .report-content td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; white-space: nowrap; }
.report-content th { background: var(--surface2); color: var(--accent); }
.report-content blockquote { border-left: 3px solid var(--accent); padding: 8px 16px; margin: 12px 0; background: var(--surface2); color: var(--text2); border-radius: 0 4px 4px 0; }
.report-content code { background: var(--surface2); padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
.report-content ul, .report-content ol { padding-left: 24px; margin: 8px 0; }

.loading { text-align: center; padding: 40px; color: var(--text2); }
</style>
</head>
<body>
<!-- Top navigation -->
<div class="topbar">
  <div class="logo">🎯 智能托管广告</div>
  <a href="index.html" class="nav-link">📊 报告中心</a>
  <a href="config.html" class="nav-link">⚙️ 托管组配置</a>
  <a href="weekly-report.html" class="nav-link active">📈 周报分析</a>
</div>

<!-- Week selector header -->
<div class="week-header">
  <h2>📊 智能广告托管周报</h2>
  <div class="week-selector">
    <span>📅 选择周报：</span>
    <select id="weekSelect"></select>
    <span class="week-info" id="weekInfo">加载中...</span>
  </div>
</div>

<div class="container">
  <!-- Main Tabs -->
  <div class="main-tabs">
    <button class="main-tab active" data-tab="eip-overall">📊 EIP 自研 AI 整体</button>
    <button class="main-tab" data-tab="eip-groups">📋 EIP 各组明细</button>
    <button class="main-tab" data-tab="oc-overall">🦞 OpenClaw 整体</button>
    <button class="main-tab" data-tab="oc-groups">📋 OpenClaw 各组明细</button>
    <button class="main-tab" data-tab="report">📝 完整报告</button>
  </div>

  <!-- Tab 1: EIP Overall -->
  <div id="eip-overall" class="tab-panel active">
    <div class="kpi-grid" id="eip-kpi-cards"></div>
    <div class="charts-section">
      <h3>📈 趋势图表</h3>
      <div class="charts-grid" id="eip-charts"></div>
    </div>
  </div>

  <!-- Tab 2: EIP Groups -->
  <div id="eip-groups" class="tab-panel">
    <div class="detail-layout">
      <div class="group-list">
        <h4>🏷️ 选择托管组</h4>
        <div id="eip-group-list"></div>
      </div>
      <div class="group-detail">
        <div id="eip-group-kpi"></div>
        <div class="charts-section">
          <h3>📈 组趋势图表</h3>
          <div class="charts-grid" id="eip-group-charts"></div>
        </div>
        <div id="eip-phase-table-container"></div>
      </div>
    </div>
  </div>

  <!-- Tab 3: OpenClaw Overall -->
  <div id="oc-overall" class="tab-panel">
    <div class="kpi-grid" id="oc-kpi-cards"></div>
    <div class="charts-section">
      <h3>📈 趋势图表</h3>
      <div class="charts-grid" id="oc-charts"></div>
    </div>
  </div>

  <!-- Tab 4: OpenClaw Groups -->
  <div id="oc-groups" class="tab-panel">
    <div class="detail-layout">
      <div class="group-list">
        <h4>🦞 选择托管组</h4>
        <div id="oc-group-list"></div>
      </div>
      <div class="group-detail">
        <div id="oc-group-kpi"></div>
        <div class="charts-section">
          <h3>📈 组趋势图表</h3>
          <div class="charts-grid" id="oc-group-charts"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tab 5: Full Report -->
  <div id="report" class="tab-panel">
    <div class="report-content" id="report-content">
      <div class="loading">加载报告中...</div>
    </div>
  </div>
</div>
<script>
// ==================== Global State ====================
let weeklyIndex = [];
let currentData = null;
let chartInstances = {};

// ==================== Data Loading ====================
async function init() {
  const indexRes = await fetch('data/weekly-index.json');
  weeklyIndex = await indexRes.json();
  
  const sel = document.getElementById('weekSelect');
  weeklyIndex.forEach((w, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = w.label;
    sel.appendChild(opt);
  });
  
  const hashDate = location.hash.slice(1);
  const matchIdx = hashDate ? weeklyIndex.findIndex(w => w.endDate === hashDate) : weeklyIndex.length - 1;
  sel.value = matchIdx >= 0 ? matchIdx : weeklyIndex.length - 1;
  sel.addEventListener('change', () => loadWeek(parseInt(sel.value)));
  
  loadWeek(parseInt(sel.value));
}

async function loadWeek(idx) {
  const week = weeklyIndex[idx];
  location.hash = week.endDate;
  document.getElementById('weekInfo').textContent = `报告周期: ${week.label}`;
  
  // Destroy existing charts
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};
  
  // Load raw data
  const dataFile = week.dataFile;
  const dataRes = await fetch(`data/weekly-reports/${dataFile}`);
  currentData = await dataRes.json();
  
  // Render all tabs
  renderEipOverall();
  renderEipGroups();
  renderOcOverall();
  renderOcGroups();
  loadReport(week.endDate);
}

// ==================== Data Aggregation ====================
function mergeMetrics(metricsArray) {
  const sum = { impressions: 0, clicks: 0, spend: 0, orders: 0, salesVolume: 0, salesAmount: 0 };
  metricsArray.forEach(m => {
    sum.impressions += m.impressions || 0;
    sum.clicks += m.clicks || 0;
    sum.spend += m.spend || 0;
    sum.orders += m.orders || 0;
    sum.salesVolume += m.salesVolume || 0;
    sum.salesAmount += m.salesAmount || 0;
  });
  // Recalculate ratios
  sum.acos = sum.salesAmount > 0 ? (sum.spend / sum.salesAmount * 100) : 0;
  sum.roas = sum.spend > 0 ? (sum.salesAmount / sum.spend) : 0;
  sum.ctr = sum.impressions > 0 ? (sum.clicks / sum.impressions * 100) : 0;
  sum.cpc = sum.clicks > 0 ? (sum.spend / sum.clicks) : 0;
  sum.cvr = sum.clicks > 0 ? (sum.orders / sum.clicks * 100) : 0;
  return sum;
}

function getEipAggregatedPhases() {
  const groups = currentData.eipAiGroups || [];
  if (groups.length === 0) return [];
  
  const phaseNames = groups[0].phases.map(p => p.name);
  return phaseNames.map((name, idx) => {
    const phaseMetrics = groups.map(g => g.phases[idx]?.metrics || {});
    const merged = mergeMetrics(phaseMetrics);
    const phaseInfo = groups[0].phases[idx];
    return { name, start: phaseInfo.start, end: phaseInfo.end, type: phaseInfo.type, metrics: merged };
  });
}

function getEipAggregatedDaily() {
  const groups = currentData.eipAiGroups || [];
  if (groups.length === 0) return [];
  
  const dateMap = {};
  groups.forEach(g => {
    (g.daily || []).forEach(d => {
      const date = d.date;
      const m = d.metrics || d;
      if (!dateMap[date]) dateMap[date] = [];
      dateMap[date].push(m);
    });
  });
  
  return Object.keys(dateMap).sort().map(date => ({
    date,
    metrics: mergeMetrics(dateMap[date])
  }));
}

function getOcAggregatedOverall() {
  const groups = currentData.openclawGroups || [];
  const overalls = groups.map(g => g.overall?.metrics || g.overall || {}).filter(o => Object.keys(o).length > 0);
  if (overalls.length === 0) return null;
  return mergeMetrics(overalls);
}

function getOcAggregatedDaily() {
  const groups = currentData.openclawGroups || [];
  const dateMap = {};
  groups.forEach(g => {
    (g.daily || []).forEach(d => {
      const date = d.date;
      const m = d.metrics || d;
      if (!dateMap[date]) dateMap[date] = [];
      dateMap[date].push(m);
    });
  });
  return Object.keys(dateMap).sort().map(date => ({
    date,
    metrics: mergeMetrics(dateMap[date])
  }));
}
// ==================== KPI Card Rendering ====================
function formatNumber(n, decimals = 2) {
  if (n == null || isNaN(n)) return '-';
  if (Math.abs(n) >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (Math.abs(n) >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toFixed(decimals);
}

function formatPercent(n) {
  if (n == null || isNaN(n)) return '-';
  return n.toFixed(2) + '%';
}

function calcChange(current, baseline, isLowerBetter = false) {
  if (!baseline || baseline === 0) return { text: '-', class: 'neutral' };
  const diff = current - baseline;
  const pct = (diff / baseline * 100).toFixed(1);
  const arrow = diff > 0 ? '↑' : diff < 0 ? '↓' : '';
  const isPositive = isLowerBetter ? diff < 0 : diff > 0;
  return {
    text: `${arrow}${Math.abs(pct)}%`,
    class: diff === 0 ? 'neutral' : (isPositive ? 'positive' : 'negative')
  };
}

function calcPpChange(current, baseline, isLowerBetter = false) {
  if (baseline == null) return { text: '-', class: 'neutral' };
  const diff = current - baseline;
  const arrow = diff > 0 ? '↑' : diff < 0 ? '↓' : '';
  const isPositive = isLowerBetter ? diff < 0 : diff > 0;
  return {
    text: `${arrow}${Math.abs(diff).toFixed(2)}pp`,
    class: diff === 0 ? 'neutral' : (isPositive ? 'positive' : 'negative')
  };
}

function renderKpiCards(containerId, phases, showPhaseComparison = true) {
  const container = document.getElementById(containerId);
  if (!container) return;
  
  const latest = phases[phases.length - 1]?.metrics || {};
  const baseline = phases[0]?.metrics || {};
  
  const cards = [
    {
      title: '💰 广告效果',
      metrics: [
        { label: 'ACOS', value: formatPercent(latest.acos), change: calcPpChange(latest.acos, baseline.acos, true) },
        { label: '花费', value: '$' + formatNumber(latest.spend), change: calcChange(latest.spend, baseline.spend) },
        { label: '销售额', value: '$' + formatNumber(latest.salesAmount), change: calcChange(latest.salesAmount, baseline.salesAmount) }
      ]
    },
    {
      title: '👁️ 曝光点击',
      metrics: [
        { label: '曝光量', value: formatNumber(latest.impressions, 0), change: calcChange(latest.impressions, baseline.impressions) },
        { label: '点击量', value: formatNumber(latest.clicks, 0), change: calcChange(latest.clicks, baseline.clicks) },
        { label: 'CTR', value: formatPercent(latest.ctr), change: calcPpChange(latest.ctr, baseline.ctr) }
      ]
    },
    {
      title: '🎯 转化',
      metrics: [
        { label: '订单', value: formatNumber(latest.orders, 0), change: calcChange(latest.orders, baseline.orders) },
        { label: 'CVR', value: formatPercent(latest.cvr), change: calcPpChange(latest.cvr, baseline.cvr) },
        { label: 'CPC', value: '$' + formatNumber(latest.cpc), change: calcChange(latest.cpc, baseline.cpc, true) }
      ]
    }
  ];
  
  container.innerHTML = cards.map(card => `
    <div class="kpi-card">
      <h4>${card.title}</h4>
      <div class="kpi-metrics">
        ${card.metrics.map(m => `
          <div class="kpi-metric">
            <span class="label">${m.label}</span>
            <div>
              <span class="value">${m.value}</span>
              ${showPhaseComparison ? `<span class="change ${m.change.class}">${m.change.text}</span>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function renderOcKpiCards(containerId, overall, daily) {
  const container = document.getElementById(containerId);
  if (!container || !overall) return;
  
  // Calculate recent 7 days vs previous 5 days
  const recent7 = daily.slice(-7);
  const prev5 = daily.slice(-12, -7);
  
  const recent7Metrics = mergeMetrics(recent7.map(d => d.metrics));
  const prev5Metrics = prev5.length > 0 ? mergeMetrics(prev5.map(d => d.metrics)) : null;
  
  const cards = [
    {
      title: '💰 广告效果（累计）',
      metrics: [
        { label: 'ACOS', value: formatPercent(overall.acos), change: prev5Metrics ? calcPpChange(recent7Metrics.acos, prev5Metrics.acos, true) : null },
        { label: '总花费', value: '$' + formatNumber(overall.spend), change: null },
        { label: '总销售额', value: '$' + formatNumber(overall.salesAmount), change: null }
      ]
    },
    {
      title: '👁️ 曝光点击（累计）',
      metrics: [
        { label: '总曝光', value: formatNumber(overall.impressions, 0), change: null },
        { label: '总点击', value: formatNumber(overall.clicks, 0), change: null },
        { label: 'CTR', value: formatPercent(overall.ctr), change: prev5Metrics ? calcPpChange(recent7Metrics.ctr, prev5Metrics.ctr) : null }
      ]
    },
    {
      title: '📊 近7天 vs 前5天',
      metrics: [
        { label: 'ACOS变化', value: formatPercent(recent7Metrics.acos), change: prev5Metrics ? calcPpChange(recent7Metrics.acos, prev5Metrics.acos, true) : { text: '-', class: 'neutral' } },
        { label: '订单变化', value: formatNumber(recent7Metrics.orders, 0), change: prev5Metrics ? calcChange(recent7Metrics.orders, prev5Metrics.orders) : { text: '-', class: 'neutral' } },
        { label: 'CVR变化', value: formatPercent(recent7Metrics.cvr), change: prev5Metrics ? calcPpChange(recent7Metrics.cvr, prev5Metrics.cvr) : { text: '-', class: 'neutral' } }
      ]
    }
  ];
  
  container.innerHTML = cards.map(card => `
    <div class="kpi-card">
      <h4>${card.title}</h4>
      <div class="kpi-metrics">
        ${card.metrics.map(m => `
          <div class="kpi-metric">
            <span class="label">${m.label}</span>
            <div>
              <span class="value">${m.value}</span>
              ${m.change ? `<span class="change ${m.change.class}">${m.change.text}</span>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}
// ==================== Chart Rendering ====================
Chart.defaults.color = '#8b949e';
Chart.defaults.borderColor = '#30363d';
Chart.defaults.font.size = 11;

function getPhaseAnnotations(daily, phases) {
  if (!phases || phases.length < 2) return {};
  
  const annotations = {};
  const colors = ['rgba(139,148,158,0.06)', 'rgba(88,166,255,0.06)', 'rgba(63,185,80,0.06)'];
  
  phases.forEach((phase, i) => {
    const startIdx = daily.findIndex(d => d.date >= phase.start);
    const endIdx = phase.end ? daily.findIndex(d => d.date > phase.end) : daily.length;
    const actualEnd = endIdx === -1 ? daily.length : endIdx;
    
    if (startIdx >= 0) {
      // Phase background
      annotations['box' + i] = {
        type: 'box',
        xMin: startIdx - 0.5,
        xMax: actualEnd - 0.5,
        backgroundColor: colors[i % colors.length],
        borderWidth: 0
      };
      
      // Phase boundary line (except first)
      if (i > 0 && startIdx > 0) {
        annotations['line' + i] = {
          type: 'line',
          xMin: startIdx - 0.5,
          xMax: startIdx - 0.5,
          borderColor: '#58a6ff',
          borderWidth: 2,
          borderDash: [6, 4],
          label: {
            display: true,
            content: phase.name,
            position: 'start',
            backgroundColor: 'rgba(88,166,255,0.9)',
            color: '#fff',
            font: { size: 10, weight: 'bold' },
            padding: 4
          }
        };
      }
    }
  });
  
  return annotations;
}

function createDualAxisChart(containerId, chartId, title, daily, phases, config) {
  const container = document.getElementById(containerId);
  if (!container) return;
  
  const card = document.createElement('div');
  card.className = 'chart-card';
  card.innerHTML = `<h4>${title}</h4><div class="chart-wrap"><canvas id="${chartId}"></canvas></div>`;
  container.appendChild(card);
  
  const ctx = document.getElementById(chartId).getContext('2d');
  const labels = daily.map(d => d.date.slice(5)); // MM-DD format
  
  const annotations = getPhaseAnnotations(daily, phases);
  
  const datasets = [];
  
  // Left Y-axis datasets (area fill)
  config.leftAxis.forEach((cfg, i) => {
    const colors = ['rgba(88,166,255,0.6)', 'rgba(63,185,80,0.6)', 'rgba(210,153,34,0.6)'];
    const bgColors = ['rgba(88,166,255,0.15)', 'rgba(63,185,80,0.15)', 'rgba(210,153,34,0.15)'];
    datasets.push({
      label: cfg.label,
      data: daily.map(d => d.metrics[cfg.key]),
      borderColor: colors[i % colors.length],
      backgroundColor: cfg.fill ? bgColors[i % bgColors.length] : 'transparent',
      fill: cfg.fill || false,
      tension: 0.3,
      yAxisID: 'y',
      pointRadius: 2,
      borderWidth: 2
    });
  });
  
  // Right Y-axis datasets (dashed lines)
  config.rightAxis.forEach((cfg, i) => {
    const colors = ['rgba(248,81,73,0.8)', 'rgba(163,113,247,0.8)', 'rgba(255,166,87,0.8)'];
    datasets.push({
      label: cfg.label,
      data: daily.map(d => d.metrics[cfg.key]),
      borderColor: colors[i % colors.length],
      backgroundColor: 'transparent',
      borderDash: [5, 5],
      tension: 0.3,
      yAxisID: 'y1',
      pointRadius: 2,
      borderWidth: 2
    });
  });
  
  const chart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 12, padding: 10 } },
        annotation: { annotations },
        datalabels: { display: false }
      },
      scales: {
        x: { grid: { display: false }, ticks: { maxRotation: 45, font: { size: 9 } } },
        y: {
          type: 'linear',
          position: 'left',
          beginAtZero: true,
          title: { display: true, text: config.leftLabel || '', font: { size: 10 } },
          grid: { color: 'rgba(48,54,61,0.5)' }
        },
        y1: {
          type: 'linear',
          position: 'right',
          beginAtZero: true,
          title: { display: true, text: config.rightLabel || '', font: { size: 10 } },
          grid: { display: false }
        }
      }
    }
  });
  
  chartInstances[chartId] = chart;
}

function renderTrendCharts(containerId, daily, phases, prefix) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  
  // Chart 1: Ad Performance (Spend + Sales vs ACOS)
  createDualAxisChart(containerId, prefix + '-perf', '💰 广告效果趋势', daily, phases, {
    leftAxis: [
      { key: 'spend', label: '花费 ($)', fill: true },
      { key: 'salesAmount', label: '销售额 ($)', fill: true }
    ],
    rightAxis: [
      { key: 'acos', label: 'ACOS (%)' }
    ],
    leftLabel: '金额 ($)',
    rightLabel: 'ACOS (%)'
  });
  
  // Chart 2: Exposure (Impressions + Clicks vs CTR)
  createDualAxisChart(containerId, prefix + '-exposure', '👁️ 曝光点击趋势', daily, phases, {
    leftAxis: [
      { key: 'impressions', label: '曝光量', fill: false },
      { key: 'clicks', label: '点击量', fill: false }
    ],
    rightAxis: [
      { key: 'ctr', label: 'CTR (%)' }
    ],
    leftLabel: '数量',
    rightLabel: 'CTR (%)'
  });
  
  // Chart 3: Conversion (Orders vs CVR + CPC)
  createDualAxisChart(containerId, prefix + '-conv', '🎯 转化趋势', daily, phases, {
    leftAxis: [
      { key: 'orders', label: '订单', fill: true },
      { key: 'salesVolume', label: '销量', fill: false }
    ],
    rightAxis: [
      { key: 'cvr', label: 'CVR (%)' },
      { key: 'cpc', label: 'CPC ($)' }
    ],
    leftLabel: '数量',
    rightLabel: '比率/CPC'
  });
}

function renderEipGroups() {

            <th>CPC</th>

// ==================== Report Loading ====================
async function loadReport(dateStr) {
  const reportContainer = document.getElementById('report-content');
  try {
    // Try multiple paths
    const paths = [
      `data/weekly-reports/report-${dateStr}.md`,
      `data/weekly-0208-0316/report-${dateStr}.md`
    ];
    
    let md = null;
    for (const path of paths) {
      try {
        const res = await fetch(path);
        if (res.ok) {
          md = await res.text();
          break;
        }
      } catch (e) {}
    }
    
    if (md) {
      // Escape standalone ~ (range separator like 2/26~3/17) to prevent
      // marked from treating them as strikethrough (~text~).
      // Replace ~ that is NOT part of ~~ with a unicode tilde ∼ (U+223C).
      md = md.replace(/(?<!~)~(?!~)/g, '∼');
      reportContainer.innerHTML = marked.parse(md);
    } else {
      reportContainer.innerHTML = '<div class="loading">报告文件未找到</div>';
    }
  } catch (e) {
    reportContainer.innerHTML = `<div class="loading">报告加载失败: ${e.message}</div>`;
  }
}

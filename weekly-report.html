<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能广告托管周报</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
  --border: #30363d; --text: #e6edf3; --text2: #8b949e;
  --accent: #58a6ff; --green: #3fb950; --red: #f85149; --orange: #d29922;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; }
.container { max-width: 1200px; margin: 0 auto; padding: 16px; }
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 0; margin-bottom: 24px; }
header h1 { text-align: center; font-size: 1.5em; color: var(--accent); }
header p { text-align: center; color: var(--text2); font-size: 0.9em; margin-top: 4px; }

/* Tabs */
.tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.tab { padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; color: var(--text2); font-size: 0.9em; transition: all 0.2s; }
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.tab:hover { border-color: var(--accent); }

/* Sections */
.section { display: none; }
.section.active { display: block; }

/* Charts */
.charts-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
@media (min-width: 768px) { .charts-grid { grid-template-columns: 1fr 1fr; } }
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.chart-card.full { grid-column: 1 / -1; }
.chart-card h3 { font-size: 0.95em; color: var(--text2); margin-bottom: 12px; }
.chart-wrap { position: relative; width: 100%; }

/* Markdown */
.report-content { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px; }
.report-content h1 { color: var(--accent); font-size: 1.4em; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 16px; }
.report-content h2 { color: var(--green); font-size: 1.2em; margin-top: 24px; margin-bottom: 12px; }
.report-content h3 { color: var(--orange); font-size: 1.05em; margin-top: 20px; margin-bottom: 8px; }
.report-content h4 { color: var(--text); font-size: 1em; margin-top: 16px; margin-bottom: 8px; }
.report-content table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.85em; overflow-x: auto; display: block; }
.report-content th, .report-content td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; white-space: nowrap; }
.report-content th { background: var(--surface2); color: var(--accent); }
.report-content td { background: var(--surface); }
.report-content blockquote { border-left: 3px solid var(--accent); padding: 8px 16px; margin: 12px 0; background: var(--surface2); color: var(--text2); border-radius: 0 4px 4px 0; }
.report-content code { background: var(--surface2); padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
.report-content strong { color: #fff; }
.report-content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
.report-content ul, .report-content ol { padding-left: 24px; margin: 8px 0; }
.report-content li { margin: 4px 0; }
.report-content p { margin: 8px 0; }

.loading { text-align: center; padding: 40px; color: var(--text2); }
</style>
</head>
<body>
<header>
  <div class="container">
    <h1>📊 智能广告托管周报</h1>
    <p id="report-date">加载中...</p>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <div class="tab active" data-tab="charts">📈 图表分析</div>
    <div class="tab" data-tab="report">📋 完整报告</div>
  </div>

  <div id="charts-section" class="section active">
    <h2 style="color:var(--accent);margin-bottom:16px;">OpenClaw 托管组每日趋势</h2>
    <div class="charts-grid" id="daily-charts"></div>
    
    <h2 style="color:var(--accent);margin:24px 0 16px;">OpenClaw 阶段横向对比</h2>
    <div class="charts-grid" id="phase-charts"></div>

    <h2 style="color:var(--accent);margin:24px 0 16px;">EIP AI 趋势与对比</h2>
    <div class="charts-grid" id="eip-charts"></div>
  </div>

  <div id="report-section" class="section">
    <div class="report-content" id="report-content">
      <div class="loading">加载报告中...</div>
    </div>
  </div>
</div>

<script>
const dateStr = location.hash.slice(1) || '2026-03-16';
document.getElementById('report-date').textContent = `报告周期截至 ${dateStr}`;

// Tab switching
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.tab + '-section').classList.add('active');
  });
});

Chart.defaults.color = '#8b949e';
Chart.defaults.borderColor = '#30363d';
Chart.defaults.font.size = 11;

function createChartCard(container, chart, isFull) {
  const card = document.createElement('div');
  card.className = 'chart-card' + (isFull ? ' full' : '');
  card.innerHTML = `<h3>${chart.title}</h3><div class="chart-wrap"><canvas></canvas></div>`;
  container.appendChild(card);
  const canvas = card.querySelector('canvas');
  
  // Build annotation plugin config for phase backgrounds
  const annotations = {};
  if (chart.phaseAnnotations) {
    chart.phaseAnnotations.forEach((pa, i) => {
      annotations['box' + i] = {
        type: 'box',
        xMin: pa.start - 0.5,
        xMax: pa.end + 0.5,
        backgroundColor: pa.color,
        borderWidth: 0,
        label: {
          display: true,
          content: pa.label,
          position: { x: 'center', y: 'start' },
          color: '#8b949e',
          font: { size: 9 }
        }
      };
      // Phase boundary line
      if (i > 0) {
        annotations['line' + i] = {
          type: 'line',
          xMin: pa.start - 0.5,
          xMax: pa.start - 0.5,
          borderColor: '#58a6ff44',
          borderWidth: 1,
          borderDash: [4, 4]
        };
      }
    });
  }

  const cfg = {
    type: chart.type,
    data: { labels: chart.labels, datasets: chart.datasets },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      aspectRatio: chart.type === 'line' ? 2 : 1.8,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 12, padding: 8 } },
        annotation: { annotations }
      },
      scales: {
        x: { grid: { display: false }, ticks: { maxRotation: 45, font: { size: 9 } } },
        y: { 
          beginAtZero: true,
          title: chart.yAxisLabel ? { display: true, text: chart.yAxisLabel, font: { size: 10 } } : undefined
        }
      }
    }
  };

  // For bar charts with null data, skip nulls
  if (chart.type === 'bar') {
    cfg.options.skipNull = true;
  }

  new Chart(canvas, cfg);
}

// Load charts
fetch(`data/weekly/charts-${dateStr}.json`)
  .then(r => r.json())
  .then(({charts}) => {
    const dailyContainer = document.getElementById('daily-charts');
    const phaseContainer = document.getElementById('phase-charts');
    const eipContainer = document.getElementById('eip-charts');
    
    charts.forEach(c => {
      if (c.id.includes('daily')) {
        createChartCard(dailyContainer, c, false);
      } else if (c.id.includes('phase') || c.id.includes('compare')) {
        createChartCard(phaseContainer, c, c.id.includes('compare'));
      } else if (c.id.includes('eip') || c.id.includes('vs')) {
        createChartCard(eipContainer, c, false);
      }
    });
  })
  .catch(e => {
    document.getElementById('daily-charts').innerHTML = `<div class="loading">图表加载失败: ${e.message}</div>`;
  });

// Load report
fetch(`data/weekly/report-${dateStr}.md`)
  .then(r => r.text())
  .then(md => {
    document.getElementById('report-content').innerHTML = marked.parse(md);
  })
  .catch(e => {
    document.getElementById('report-content').innerHTML = `<div class="loading">报告加载失败: ${e.message}</div>`;
  });
</script>
</body>
</html>

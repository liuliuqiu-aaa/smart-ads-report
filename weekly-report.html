<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能托管广告 - 周报分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--orange:#d29922;--purple:#bc8cff}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.6}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:44px;gap:16px}
.topbar .logo{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap}
.topbar .nav-link{color:var(--text2);text-decoration:none;font-size:13px;padding:4px 10px;border-radius:4px;transition:all .2s}
.topbar .nav-link:hover{color:var(--text);background:rgba(255,255,255,.05)}
.topbar .nav-link.active{color:var(--accent);background:rgba(99,102,241,.1)}
.week-header{background:linear-gradient(135deg,#1e1b4b,#312e81);padding:16px 32px}
.week-header h2{font-size:20px;font-weight:600;margin-bottom:10px}
.week-header .week-selector{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.week-header select{background:rgba(255,255,255,0.1);color:var(--text);border:1px solid rgba(255,255,255,0.2);padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer}
.week-header .week-info{color:var(--text2);font-size:13px}
.container{max-width:1400px;margin:0 auto;padding:16px}
.main-tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);padding:4px;border-radius:8px;flex-wrap:wrap}
.main-tab{padding:8px 16px;background:transparent;border:none;border-radius:6px;cursor:pointer;color:var(--text2);font-size:13px;transition:all .2s}
.main-tab.active{background:var(--accent);color:#fff}
.main-tab:hover:not(.active){color:var(--text);background:var(--surface2)}
.tab-content{display:none}.tab-content.active{display:block}
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:20px}
.filter-toggle{display:none;background:none;border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;width:100%;text-align:left}
.filter-toggle::after{content:'\25BC';float:right;font-size:10px;transition:transform .2s}
.filter-toggle.open::after{transform:rotate(180deg)}
.filter-rows{display:flex;flex-direction:column;gap:10px}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-label{font-size:12px;color:var(--text2);min-width:52px;flex-shrink:0;font-weight:500}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap}
.filter-pill{padding:4px 12px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;user-select:none}
.filter-pill:hover:not(.disabled){border-color:var(--accent);color:var(--text)}
.filter-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-pill.active.season-summer{background:#e67e22;border-color:#e67e22}
.filter-pill.active.season-winter{background:#3498db;border-color:#3498db}
.filter-pill.active.season-allyear{background:#7f8c8d;border-color:#7f8c8d}
.filter-pill.disabled{opacity:.35;pointer-events:none}
.filter-count{font-size:12px;color:var(--text2);font-weight:normal}
@media(max-width:768px){.filter-toggle{display:block}.filter-rows.collapsed{display:none}.filter-toggle+.filter-rows{margin-top:10px}}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.kpi-card h4{font-size:13px;color:var(--text2);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px}
.kpi-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.kpi-label{font-size:12px;color:var(--text2)}.kpi-value{font-size:16px;font-weight:600}
.kpi-change{font-size:11px;padding:2px 6px;border-radius:4px}
.kpi-change.good{color:var(--green);background:rgba(63,185,80,.1)}
.kpi-change.bad{color:var(--red);background:rgba(248,81,73,.1)}
.kpi-change.neutral{color:var(--text2);background:var(--surface2)}
.section-divider{border:none;border-top:1px solid var(--border);margin:28px 0 20px}
.section-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:16px}
.charts-row{display:grid;grid-template-columns:1fr;gap:20px;margin-bottom:24px}
@media(min-width:1024px){.charts-row.triple{grid-template-columns:1fr 1fr 1fr}}
@media(min-width:768px) and (max-width:1023px){.charts-row.triple{grid-template-columns:1fr 1fr}}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.chart-card h3{font-size:13px;color:var(--text2);margin-bottom:12px}
.chart-card canvas{width:100% !important}
.group-layout{display:grid;grid-template-columns:260px 1fr;gap:20px}
@media(max-width:768px){.group-layout{grid-template-columns:1fr}}
.group-list{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;max-height:600px;overflow-y:auto}
.group-item{padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .2s}
.group-item:hover{background:var(--surface2);color:var(--text)}
.group-item.active{background:var(--accent);color:#fff}
.group-item .spu{display:block;font-size:11px;opacity:0.7}
.group-item .gtags{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.gtag{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);line-height:1.5}
.group-item.active .gtag{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.25);color:#fff}
.group-detail{min-height:400px}
.phase-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.phase-table th,.phase-table td{padding:8px 12px;border:1px solid var(--border);text-align:center}
.phase-table th{background:var(--surface2);color:var(--accent);font-size:12px}
.phase-table td{background:var(--surface)}
.m2-summary{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:16px}
.m2-summary h4{font-size:13px;color:var(--purple);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px}
.report-content{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px}
.report-content h1{color:var(--accent);font-size:1.4em;border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:16px}
.report-content h2{color:var(--green);font-size:1.2em;margin-top:24px;margin-bottom:12px}
.report-content h3{color:var(--orange);font-size:1.05em;margin-top:20px;margin-bottom:8px}
.report-content table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.85em;overflow-x:auto;display:block}
.report-content th,.report-content td{padding:6px 10px;border:1px solid var(--border);text-align:left;white-space:nowrap}
.report-content th{background:var(--surface2);color:var(--accent)}
.report-content blockquote{border-left:3px solid var(--accent);padding:8px 16px;margin:12px 0;background:var(--surface2);color:var(--text2);border-radius:0 4px 4px 0}
.report-content strong{color:#fff}
.report-content hr{border:none;border-top:1px solid var(--border);margin:20px 0}
.report-content ul,.report-content ol{padding-left:24px;margin:8px 0}
.report-content li{margin:4px 0}.report-content p{margin:8px 0}
.loading{text-align:center;padding:40px;color:var(--text2)}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">🎯 智能托管广告</div>
  <a href="index.html" class="nav-link">📊 报告中心</a>
  <a href="config.html" class="nav-link">⚙️ 托管组配置</a>
  <a href="weekly-report.html" class="nav-link active">📈 周报分析</a>
</div>
<div class="week-header">
  <h2>📊 智能广告托管周报</h2>
  <div class="week-selector">
    <span>📅 选择周报：</span>
    <select id="weekSelect"></select>
    <span class="week-info" id="weekInfo">加载中...</span>
  </div>
</div>
<div class="container">
  <div class="main-tabs">
    <button class="main-tab active" data-tab="eip">🤖 EIP AI 自研</button>
    <button class="main-tab" data-tab="oc">🦞 OpenClaw 托管</button>
    <button class="main-tab" data-tab="report">📋 完整报告</button>
  </div>
  <div id="tab-eip" class="tab-content active">
    <div class="filter-bar">
      <button class="filter-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('collapsed')">🔍 筛选条件</button>
      <div class="filter-rows" id="eip-filters">
        <div class="filter-row"><span class="filter-label">模型</span><div class="filter-pills" id="fp-eip-model"></div></div>
        <div class="filter-row"><span class="filter-label">季节</span><div class="filter-pills" id="fp-eip-season"></div></div>
        <div class="filter-row"><span class="filter-label">L4品类</span><div class="filter-pills" id="fp-eip-l4"></div></div>
        <div class="filter-row"><span class="filter-label">L5品类</span><div class="filter-pills" id="fp-eip-l5"></div></div>
      </div>
    </div>
    <div class="kpi-row" id="eip-kpi"></div>
    <div class="charts-row triple" id="eip-charts"></div>
    <hr class="section-divider">
    <div class="section-title">📋 各组详情 <span class="filter-count" id="eip-group-count"></span></div>
    <div class="group-layout">
      <div class="group-list" id="eip-group-list"></div>
      <div class="group-detail" id="eip-group-detail"><div class="loading">选择一个托管组</div></div>
    </div>
  </div>
  <div id="tab-oc" class="tab-content">
    <div class="filter-bar">
      <button class="filter-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('collapsed')">🔍 筛选条件</button>
      <div class="filter-rows" id="oc-filters">
        <div class="filter-row"><span class="filter-label">季节</span><div class="filter-pills" id="fp-oc-season"></div></div>
        <div class="filter-row"><span class="filter-label">L4品类</span><div class="filter-pills" id="fp-oc-l4"></div></div>
        <div class="filter-row"><span class="filter-label">L5品类</span><div class="filter-pills" id="fp-oc-l5"></div></div>
      </div>
    </div>
    <div class="kpi-row" id="oc-kpi"></div>
    <div class="charts-row triple" id="oc-charts"></div>
    <hr class="section-divider">
    <div class="section-title">📋 各组详情 <span class="filter-count" id="oc-group-count"></span></div>
    <div class="group-layout">
      <div class="group-list" id="oc-group-list"></div>
      <div class="group-detail" id="oc-group-detail"><div class="loading">选择一个托管组</div></div>
    </div>
  </div>
  <div id="tab-report" class="tab-content">
    <div class="report-content" id="report-content"><div class="loading">加载报告中...</div></div>
  </div>
</div>
<script>
Chart.defaults.color='#8b949e';Chart.defaults.borderColor='#30363d';Chart.defaults.font.size=11;

var GM={
"AMJ008532":{model:"M1",season:"夏季",se:"🌞",l4:"下装",l5:"短裤",product:"Gym Shorts"},
"AMJ009685":{model:"M1",season:"夏季",se:"🌞",l4:"下装",l5:"休闲长裤",product:"Linen Pants"},
"AMJ009445":{model:"M1",season:"四季通用",se:"🔄",l4:"外套",l5:"雨衣",product:"Rain Gear"},
"AMV007502":{model:"M1",season:"夏季",se:"🌞",l4:"下装",l5:"短裤",product:"Casual Shorts"},
"AMJ006283":{model:"M1",season:"夏季",se:"🌞",l4:"外套",l5:"开衫",product:"Cardigan"},
"AMJ009855":{model:"M1",season:"夏季",se:"🌞",l4:"毛衣",l5:"开襟毛衣",product:"Polo Sets"},
"AMJ008663":{model:"M1",season:"夏季",se:"🌞",l4:"下装",l5:"休闲长裤",product:"Linen Pants"},
"AMV007707":{model:"M1",season:"夏季",se:"🌞",l4:"下装",l5:"短裤",product:"Vintage Shorts"},
"AMJ010370":{model:"M2",season:"夏季",se:"🌞",l4:"下装",l5:"短裤",product:"Chino Shorts"},
"AMJ010125":{model:"M2",season:"秋冬",se:"❄️",l4:"毛衣",l5:"半开门襟毛衣",product:"Mock Neck Sweater"},
"AMJ009711":{model:"M2",season:"夏季",se:"🌞",l4:"毛衣",l5:"开襟毛衣",product:"Knit Polo"},
"AMJ009014":{model:"M2",season:"夏季",se:"🌞",l4:"下装",l5:"休闲长裤",product:"Capris Pants"},
"AMJ010095":{model:"OC",season:"秋冬",se:"❄️",l4:"卫衣",l5:"帽衫",product:"Hoodie"},
"AMJ010001":{model:"OC",season:"秋冬",se:"❄️",l4:"毛衣",l5:"半开门襟毛衣",product:"Polo Sweater"},
"ADJ000082":{model:"OC",season:"夏季",se:"🌞",l4:"外套",l5:"开衫",product:"Beach Shirt"},
"AMJ008012":{model:"OC",season:"夏季",se:"🌞",l4:"下装",l5:"短裤",product:"Gym Shorts"}
};

var FS={eip:{model:'全部',season:'全部',l4:'全部',l5:'全部'},oc:{season:'全部',l4:'全部',l5:'全部'}};
var DATA=null,weeklyIndex=[],chartMap={};
var CL={spend:'#58a6ff',sales:'#3fb950',acos:'#f85149',orders:'#bc8cff',volume:'#d29922',ctr:'#f0883e',cvr:'#a371f7',cpc:'#79c0ff',imp:'#8b949e',clicks:'#d2a8ff'};
var SEM={'夏季':'🌞','秋冬':'❄️','四季通用':'🔄'};
var SEASON_CLS={'夏季':'season-summer','秋冬':'season-winter','四季通用':'season-allyear'};

fetch('data/weekly-index.json').then(function(r){return r.json()}).then(function(idx){
  weeklyIndex=idx;var sel=document.getElementById('weekSelect');
  idx.forEach(function(w,i){var o=document.createElement('option');o.value=i;o.textContent=w.label;sel.appendChild(o)});
  sel.value=idx.length-1;sel.addEventListener('change',function(){loadWeek(+sel.value)});loadWeek(idx.length-1);
});
document.querySelectorAll('.main-tab').forEach(function(t){t.addEventListener('click',function(){
  document.querySelectorAll('.main-tab').forEach(function(x){x.classList.remove('active')});
  document.querySelectorAll('.tab-content').forEach(function(x){x.classList.remove('active')});
  t.classList.add('active');document.getElementById('tab-'+t.dataset.tab).classList.add('active');
})});

function loadWeek(i){
  var w=weeklyIndex[i];
  document.getElementById('weekInfo').textContent='报告周期: '+w.label+' | 截至 '+w.endDate;
  var url=w.dataFile?'../data/weekly-reports/'+w.dataFile:'data/weekly-reports/weekly-data-'+w.endDate+'.json';
  fetch(url).then(function(r){return r.json()}).then(function(d){DATA=normalizeData(d);resetFS();renderAll()}).catch(function(){
    fetch('data/weekly-reports/weekly-data-'+w.endDate+'.json').then(function(r){return r.json()}).then(function(d){DATA=normalizeData(d);resetFS();renderAll()}).catch(function(){
      document.getElementById('eip-kpi').innerHTML='<div class="loading">数据加载失败</div>';
    });
  });
  fetch('data/weekly-reports/report-'+w.endDate+'.md').then(function(r){return r.ok?r.text():Promise.reject('x')})
    .then(function(md){md=md.replace(/(?<!~)~(?!~)/g,'\u223C');document.getElementById('report-content').innerHTML=marked.parse(md)})
    .catch(function(){document.getElementById('report-content').innerHTML='<div class="loading">报告未生成</div>'});
}

function normalizeData(d){
  if(d.eipM1Groups||d.eipM2Groups){
    var m1=(d.eipM1Groups||[]).map(function(g){g._model='M1';return g});
    var m2=(d.eipM2Groups||[]).map(function(g){g._model='M2';return g});
    d.eipAiGroups=m1.concat(m2);
  }
  if(d.eipAiGroups){d.eipAiGroups.forEach(function(g){if(!g._model){var m=GM[g.spu];g._model=m?m.model:'M1'}})}
  if(!d.openclawGroups)d.openclawGroups=[];
  if(!d.eipAiGroups)d.eipAiGroups=[];
  return d;
}
function resetFS(){FS.eip={model:'全部',season:'全部',l4:'全部',l5:'全部'};FS.oc={season:'全部',l4:'全部',l5:'全部'}}

function pn(v){return v==null?0:typeof v==='number'?v:parseFloat(String(v).replace(/[$%,]/g,''))||0}
function chg(n,o,inv){if(!o||o===0)return{text:'N/A',cls:'neutral'};var d=((n-o)/o*100);var g=inv?(d<0):(d>0);return{text:(d>0?'+':'')+d.toFixed(1)+'%',cls:g?'good':'bad'}}
function chgPP(n,o,inv){if(o==null)return{text:'N/A',cls:'neutral'};var d=n-o;var g=inv?(d<0):(d>0);return{text:(d>0?'+':'')+d.toFixed(2)+'pp',cls:g?'good':'bad'}}
function kR(l,v,c){return '<div class="kpi-item"><span class="kpi-label">'+l+'</span><span class="kpi-value">'+v+'</span>'+(c&&c.text?'<span class="kpi-change '+c.cls+'">'+c.text+'</span>':'')+'</div>'}

function mergeDaily(groups){
  var map={};groups.forEach(function(g){(g.daily||[]).forEach(function(d){
    if(!map[d.date])map[d.date]={date:d.date,impressions:0,clicks:0,spend:0,orders:0,salesVolume:0,salesAmount:0};
    var m=d.metrics;map[d.date].impressions+=pn(m.impressions);map[d.date].clicks+=pn(m.clicks);map[d.date].spend+=pn(m.spend);map[d.date].orders+=pn(m.orders);map[d.date].salesVolume+=pn(m.salesVolume);map[d.date].salesAmount+=pn(m.salesAmount);
  })});
  var arr=Object.values(map).sort(function(a,b){return a.date.localeCompare(b.date)});
  return arr.map(function(d){return{date:d.date,metrics:Object.assign({},d,{acos:d.salesAmount>0?(d.spend/d.salesAmount*100):0,ctr:d.impressions>0?(d.clicks/d.impressions*100):0,cvr:d.clicks>0?(d.orders/d.clicks*100):0,cpc:d.clicks>0?(d.spend/d.clicks):0})}});
}

function mergePhases(groups){
  var pgs=groups.filter(function(g){return g.phases&&g.phases.length>=3});
  if(!pgs.length)return[];
  return pgs[0].phases.map(function(_,i){
    var t={impressions:0,clicks:0,spend:0,orders:0,salesVolume:0,salesAmount:0},days=1;
    pgs.forEach(function(g){var p=g.phases?g.phases[i]:null;if(!p)return;t.impressions+=pn(p.metrics.impressions);t.clicks+=pn(p.metrics.clicks);t.spend+=pn(p.metrics.spend);t.orders+=pn(p.metrics.orders);t.salesVolume+=pn(p.metrics.salesVolume);t.salesAmount+=pn(p.metrics.salesAmount);days=p.days||1});
    var ref=pgs[0].phases[i];
    return{name:ref.name,start:ref.start,end:ref.end,type:ref.type,days:days,
      metrics:Object.assign({},t,{acos:t.salesAmount>0?(t.spend/t.salesAmount*100):0,ctr:t.impressions>0?(t.clicks/t.impressions*100):0,cvr:t.clicks>0?(t.orders/t.clicks*100):0,cpc:t.clicks>0?(t.spend/t.clicks):0}),
      dailyAvg:{spend:t.spend/days,orders:t.orders/days,salesAmount:t.salesAmount/days,salesVolume:t.salesVolume/days,impressions:t.impressions/days,clicks:t.clicks/days}};
  });
}

function mergeM2Phases(groups){
  var pgs=groups.filter(function(g){return g.phases&&g.phases.length>=2});
  if(!pgs.length)return[];
  return pgs[0].phases.map(function(_,i){
    var t={impressions:0,clicks:0,spend:0,orders:0,salesVolume:0,salesAmount:0},days=1;
    pgs.forEach(function(g){var p=g.phases?g.phases[i]:null;if(!p)return;t.impressions+=pn(p.metrics.impressions);t.clicks+=pn(p.metrics.clicks);t.spend+=pn(p.metrics.spend);t.orders+=pn(p.metrics.orders);t.salesVolume+=pn(p.metrics.salesVolume);t.salesAmount+=pn(p.metrics.salesAmount);days=p.days||1});
    var ref=pgs[0].phases[i];
    return{name:ref.name,start:ref.start,end:ref.end,days:days,
      metrics:Object.assign({},t,{acos:t.salesAmount>0?(t.spend/t.salesAmount*100):0,ctr:t.impressions>0?(t.clicks/t.impressions*100):0,cvr:t.clicks>0?(t.orders/t.clicks*100):0,cpc:t.clicks>0?(t.spend/t.clicks):0}),
      dailyAvg:{spend:t.spend/days,orders:t.orders/days,salesAmount:t.salesAmount/days,salesVolume:t.salesVolume/days,impressions:t.impressions/days,clicks:t.clicks/days}};
  });
}

function mergeOcPhases(groups){
  var pgs=groups.filter(function(g){return g.phases&&g.phases.length>=2});
  if(!pgs.length)return[];
  return pgs[0].phases.map(function(_,i){
    var t={impressions:0,clicks:0,spend:0,orders:0,salesVolume:0,salesAmount:0},days=1;
    pgs.forEach(function(g){var p=g.phases?g.phases[i]:null;if(!p)return;t.impressions+=pn(p.metrics.impressions);t.clicks+=pn(p.metrics.clicks);t.spend+=pn(p.metrics.spend);t.orders+=pn(p.metrics.orders);t.salesVolume+=pn(p.metrics.salesVolume);t.salesAmount+=pn(p.metrics.salesAmount);days=p.days||1});
    var ref=pgs[0].phases[i];
    return{name:ref.name,start:ref.start,end:ref.end,days:days,
      metrics:Object.assign({},t,{acos:t.salesAmount>0?(t.spend/t.salesAmount*100):0,ctr:t.impressions>0?(t.clicks/t.impressions*100):0,cvr:t.clicks>0?(t.orders/t.clicks*100):0,cpc:t.clicks>0?(t.spend/t.clicks):0}),
      dailyAvg:{spend:t.spend/days,orders:t.orders/days,salesAmount:t.salesAmount/days,salesVolume:t.salesVolume/days,impressions:t.impressions/days,clicks:t.clicks/days}};
  });
}

function mergeOverall(groups){
  var t={impressions:0,clicks:0,spend:0,orders:0,salesVolume:0,salesAmount:0},days=1;
  groups.forEach(function(g){if(!g.overall)return;var m=g.overall.metrics;t.spend+=pn(m.spend);t.orders+=pn(m.orders);t.salesVolume+=pn(m.salesVolume);t.salesAmount+=pn(m.salesAmount);t.impressions+=pn(m.impressions);t.clicks+=pn(m.clicks);days=g.overall.days||1});
  return{days:days,metrics:Object.assign({},t,{acos:t.salesAmount>0?(t.spend/t.salesAmount*100):0,ctr:t.impressions>0?(t.clicks/t.impressions*100):0,cvr:t.clicks>0?(t.orders/t.clicks*100):0,cpc:t.clicks>0?(t.spend/t.clicks):0})};
}

function gm(g){return GM[g.spu]||null}
function fg(all,type){
  var s=FS[type];return all.filter(function(g){var m=gm(g);if(!m)return true;
    if(type==='eip'&&s.model!=='全部'&&m.model!==s.model)return false;
    if(s.season!=='全部'&&m.season!==s.season)return false;
    if(s.l4!=='全部'&&m.l4!==s.l4)return false;
    if(s.l5!=='全部'&&m.l5!==s.l5)return false;return true});
}
function avV(all,type,dim){
  var s=FS[type],vals=new Set();all.forEach(function(g){var m=gm(g);if(!m)return;
    if(type==='eip'&&dim!=='model'&&s.model!=='全部'&&m.model!==s.model)return;
    if(dim!=='season'&&s.season!=='全部'&&m.season!==s.season)return;
    if(dim!=='l4'&&dim!=='l5'&&s.l4!=='全部'&&m.l4!==s.l4)return;
    if(dim==='l5'&&s.l4!=='全部'&&m.l4!==s.l4)return;
    if(dim!=='l5'&&s.l5!=='全部'&&m.l5!==s.l5)return;
    vals.add(m[dim])});return vals;
}
function uV(all,f){var s=new Set();all.forEach(function(g){var m=gm(g);if(m&&m[f])s.add(m[f])});return Array.from(s)}

function bP(cid,opts,cur,avail,cb,isSeason){
  var ct=document.getElementById(cid);if(!ct)return;ct.innerHTML='';
  opts.forEach(function(v){var b=document.createElement('button');b.className='filter-pill'+(cur===v?' active':'');
    if(isSeason&&cur===v&&v!=='全部'){var sc=SEASON_CLS[v];if(sc)b.classList.add(sc)}
    if(v!=='全部'&&!avail.has(v))b.classList.add('disabled');
    b.textContent=v==='全部'?'全部':(SEM[v]?v+SEM[v]:v);b.onclick=function(){cb(v)};ct.appendChild(b)});
}

function renderFilters(type,all){
  var s=FS[type],dims=type==='eip'?['model','season','l4','l5']:['season','l4','l5'];
  dims.forEach(function(dim){
    var cid='fp-'+type+'-'+dim,opts=['全部'].concat(uV(all,dim)),av=avV(all,type,dim);
    bP(cid,opts,s[dim],av,function(val){
      s[dim]=val;
      if(dim==='l4'&&s.l5!=='全部'){var a5=avV(all,type,'l5');if(!a5.has(s.l5))s.l5='全部'}
      if(dim==='model'){['season','l4','l5'].forEach(function(d){var a=avV(all,type,d);if(s[d]!=='全部'&&!a.has(s[d]))s[d]='全部'})}
      if(dim==='season'){['l4','l5'].forEach(function(d){var a=avV(all,type,d);if(s[d]!=='全部'&&!a.has(s[d]))s[d]='全部'})}
      if(type==='eip')renderEip();else renderOc();
    },dim==='season');

}

  if(daily.length){
    var dates=daily.map(function(d){return d.date.slice(5)});
    chartMap['oc-charts'].push(createDualChart(ct,'广告效果趋势','花费($)',daily.map(function(d){return d.metrics.spend}),CL.spend,'销售额($)',daily.map(function(d){return d.metrics.salesAmount}),CL.sales,'ACOS(%)',daily.map(function(d){return d.metrics.acos}),CL.acos,dates,[]));
    chartMap['oc-charts'].push(createDualChart(ct,'曝光点击趋势','曝光量',daily.map(function(d){return d.metrics.impressions}),CL.imp,'点击量',daily.map(function(d){return d.metrics.clicks}),CL.clicks,'CTR(%)',daily.map(function(d){return d.metrics.ctr}),CL.ctr,dates,[]));
    chartMap['oc-charts'].push(createDualChart(ct,'转化趋势','订单',daily.map(function(d){return d.metrics.orders}),CL.orders,'销量',daily.map(function(d){return d.metrics.salesVolume}),CL.volume,'CVR(%)',daily.map(function(d){return d.metrics.cvr}),CL.cvr,dates,[]));
  }
  renderOcGroups(groups);
}

function renderOcGroups(groups){
  var list=document.getElementById('oc-group-list');list.innerHTML='';
  if(!groups.length){list.innerHTML='<div class="loading">无匹配组</div>';document.getElementById('oc-group-detail').innerHTML='';return}
  groups.forEach(function(g,i){
    var el=document.createElement('div');el.className='group-item'+(i===0?' active':'');
    var m=gm(g);var tags=m?'<div class="gtags"><span class="gtag">'+m.se+'</span><span class="gtag">'+m.l5+'</span></div>':'';
    el.innerHTML=(g.name||g.id)+'<span class="spu">'+(g.spu||'')+'</span>'+tags;
    el.onclick=function(){list.querySelectorAll('.group-item').forEach(function(x){x.classList.remove('active')});el.classList.add('active');renderOcGroupDetail(g)};
    list.appendChild(el);
  });
  renderOcGroupDetail(groups[0]);
}

function renderOcGroupDetail(g){
  var ct=document.getElementById('oc-group-detail');ct.innerHTML='';destroyCharts('oc-detail');chartMap['oc-detail']=[];

  if(g.phases&&g.phases.length>=2){
    var before=g.phases[0],after=g.phases[1];
    var bd=before.days||1,ad=after.days||1;
    var tbl=document.createElement('div');
    tbl.innerHTML='<h3 style="color:var(--accent);margin-bottom:12px">'+g.name+' 优化前后对比</h3><table class="phase-table"><tr><th>指标</th><th>'+before.name+' ('+bd+'天日均)</th><th>'+after.name+' ('+ad+'天日均)</th><th>变化</th></tr>'+
      pR2('花费($)',pn(before.metrics.spend)/bd,pn(after.metrics.spend)/ad,false)+
      pR2('订单',pn(before.metrics.orders)/bd,pn(after.metrics.orders)/ad,false)+
      pR2('销售额($)',pn(before.metrics.salesAmount)/bd,pn(after.metrics.salesAmount)/ad,false)+
      pRP2('ACOS',pn(before.metrics.acos),pn(after.metrics.acos),true)+
      pRP2('CTR',pn(before.metrics.ctr),pn(after.metrics.ctr),false)+
      pRP2('CVR',pn(before.metrics.cvr),pn(after.metrics.cvr),false)+'</table>';
    ct.appendChild(tbl);
  } else if(g.overall){
    var m=g.overall.metrics,d=g.overall.days||1;
    var tbl=document.createElement('div');
    tbl.innerHTML='<h3 style="color:var(--accent);margin-bottom:12px">'+(g.name||g.id)+' 累计数据 ('+d+'天)</h3><table class="phase-table"><tr><th>指标</th><th>累计值</th><th>日均值</th></tr>'+
      '<tr><td>花费</td><td>$'+pn(m.spend).toFixed(2)+'</td><td>$'+(pn(m.spend)/d).toFixed(2)+'</td></tr>'+
      '<tr><td>订单</td><td>'+pn(m.orders)+'</td><td>'+(pn(m.orders)/d).toFixed(1)+'</td></tr>'+
      '<tr><td>销售额</td><td>$'+pn(m.salesAmount).toFixed(2)+'</td><td>$'+(pn(m.salesAmount)/d).toFixed(2)+'</td></tr>'+
      '<tr><td>ACOS</td><td colspan="2">'+pn(m.acos).toFixed(2)+'%</td></tr><tr><td>CVR</td><td colspan="2">'+pn(m.cvr).toFixed(2)+'%</td></tr><tr><td>CPC</td><td colspan="2">$'+pn(m.cpc).toFixed(2)+'</td></tr></table>';
    ct.appendChild(tbl);
  }
  if(g.daily&&g.daily.length){
    var dates=g.daily.map(function(d){return d.date.slice(5)});
    var row=document.createElement('div');row.className='charts-row triple';ct.appendChild(row);
    chartMap['oc-detail'].push(createDualChart(row,'广告效果','花费($)',g.daily.map(function(d){return d.metrics.spend}),CL.spend,'销售额($)',g.daily.map(function(d){return d.metrics.salesAmount}),CL.sales,'ACOS(%)',g.daily.map(function(d){return d.metrics.acos}),CL.acos,dates,[]));
    chartMap['oc-detail'].push(createDualChart(row,'曝光点击','曝光',g.daily.map(function(d){return d.metrics.impressions}),CL.imp,'点击',g.daily.map(function(d){return d.metrics.clicks}),CL.clicks,'CTR(%)',g.daily.map(function(d){return d.metrics.ctr}),CL.ctr,dates,[]));
    chartMap['oc-detail'].push(createDualChart(row,'转化','订单',g.daily.map(function(d){return d.metrics.orders}),CL.orders,'销量',g.daily.map(function(d){return d.metrics.salesVolume}),CL.volume,'CVR(%)',g.daily.map(function(d){return d.metrics.cvr}),CL.cvr,dates,[]));
  }
}

/* ===== Chart Creator ===== */
function createDualChart(container,title,ll1,ld1,lc1,ll2,ld2,lc2,rl,rd,rc,labels,pLines){
  var card=document.createElement('div');card.className='chart-card';card.innerHTML='<h3>'+title+'</h3><canvas></canvas>';container.appendChild(card);
  var annotations={};
  if(pLines&&pLines.length){pLines.forEach(function(p,i){
    if(i===0)return;var ds=(p.start||p.date||'').slice(5);var idx=labels.indexOf(ds);
    if(idx>=0){annotations['pl'+i]={type:'line',xMin:idx,xMax:idx,borderColor:'rgba(88,166,255,0.4)',borderWidth:1,borderDash:[4,4],label:{display:true,content:p.name||p.label||'',position:'start',color:'#8b949e',font:{size:9},backgroundColor:'rgba(0,0,0,0.5)',padding:2}}}
  })}
  return new Chart(card.querySelector('canvas'),{type:'line',data:{labels:labels,datasets:[
    {label:ll1,data:ld1,borderColor:lc1,backgroundColor:lc1+'33',fill:true,tension:.3,yAxisID:'y',pointRadius:0,borderWidth:2},
    {label:ll2,data:ld2,borderColor:lc2,backgroundColor:lc2+'22',fill:true,tension:.3,yAxisID:'y',pointRadius:0,borderWidth:2},
    {label:rl,data:rd,borderColor:rc,borderDash:[5,5],tension:.3,yAxisID:'y1',pointRadius:0,borderWidth:2,fill:false}
  ]},options:{responsive:true,maintainAspectRatio:true,aspectRatio:1.8,interaction:{intersect:false,mode:'index'},
    plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:8,usePointStyle:true}},annotation:{annotations},datalabels:{display:false}},
    scales:{x:{grid:{display:false},ticks:{maxRotation:45,font:{size:9}}},y:{type:'linear',position:'left',beginAtZero:true,title:{display:true,text:ll1+' / '+ll2,font:{size:10}}},y1:{type:'linear',position:'right',beginAtZero:true,grid:{drawOnChartArea:false},title:{display:true,text:rl,font:{size:10}}}}}
  });
}

/* ===== Table Row Helpers ===== */
/* 3-phase row (absolute values) */
function pR3(l,b,ol,on,inv){
  var c1=b>0?chg(ol,b,inv):{text:'N/A',cls:'neutral'};
  var c2=b>0?chg(on,b,inv):{text:'N/A',cls:'neutral'};
  var c3=ol>0?chg(on,ol,inv):{text:'N/A',cls:'neutral'};
  return '<tr><td style="text-align:left">'+l+'</td><td>'+b.toFixed(2)+'</td><td>'+ol.toFixed(2)+'</td><td>'+on.toFixed(2)+'</td><td><span class="kpi-change '+c1.cls+'">'+c1.text+'</span></td><td><span class="kpi-change '+c2.cls+'">'+c2.text+'</span></td><td><span class="kpi-change '+c3.cls+'">'+c3.text+'</span></td></tr>';
}
/* 3-phase row (percentage points) */
function pRP3(l,b,ol,on,inv){
  var c1=chgPP(ol,b,inv);var c2=chgPP(on,b,inv);var c3=chgPP(on,ol,inv);
  return '<tr><td style="text-align:left">'+l+'</td><td>'+b.toFixed(2)+'%</td><td>'+ol.toFixed(2)+'%</td><td>'+on.toFixed(2)+'%</td><td><span class="kpi-change '+c1.cls+'">'+c1.text+'</span></td><td><span class="kpi-change '+c2.cls+'">'+c2.text+'</span></td><td><span class="kpi-change '+c3.cls+'">'+c3.text+'</span></td></tr>';
}
/* 3-col detail row */
function pR(l,b,ol,on,inv){
  var c=b>0?chg(on,b,inv):{text:'N/A',cls:'neutral'};
  return '<tr><td>'+l+'</td><td>'+b.toFixed(2)+'</td><td>'+ol.toFixed(2)+'</td><td>'+on.toFixed(2)+'</td><td><span class="kpi-change '+c.cls+'">'+c.text+'</span></td></tr>';
}
function pRP(l,b,ol,on,inv){
  var c=chgPP(on,b,inv);
  return '<tr><td>'+l+'</td><td>'+b.toFixed(2)+'%</td><td>'+ol.toFixed(2)+'%</td><td>'+on.toFixed(2)+'%</td><td><span class="kpi-change '+c.cls+'">'+c.text+'</span></td></tr>';
}
/* 2-phase row (OC before/after) */
function pR2(l,before,after,inv){
  var c=before>0?chg(after,before,inv):{text:'N/A',cls:'neutral'};
  return '<tr><td style="text-align:left">'+l+'</td><td>'+before.toFixed(2)+'</td><td>'+after.toFixed(2)+'</td><td><span class="kpi-change '+c.cls+'">'+c.text+'</span></td></tr>';
}
function pRP2(l,before,after,inv){
  var c=chgPP(after,before,inv);
  return '<tr><td style="text-align:left">'+l+'</td><td>'+before.toFixed(2)+'%</td><td>'+after.toFixed(2)+'%</td><td><span class="kpi-change '+c.cls+'">'+c.text+'</span></td></tr>';
}
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能托管广告 - 周报分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
  --border: #30363d; --text: #e6edf3; --text2: #8b949e;
  --accent: #58a6ff; --green: #3fb950; --red: #f85149; --orange: #d29922; --purple: #bc8cff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; line-height:1.6; }
.topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; display:flex; align-items:center; height:44px; gap:16px; }
.topbar .logo { font-size:14px; font-weight:600; color:var(--text); white-space:nowrap; }
.topbar .nav-link { color:var(--text2); text-decoration:none; font-size:13px; padding:4px 10px; border-radius:4px; transition:all .2s; }
.topbar .nav-link:hover { color:var(--text); background:rgba(255,255,255,.05); }
.topbar .nav-link.active { color:var(--accent); background:rgba(99,102,241,.1); }
.week-header { background:linear-gradient(135deg,#1e1b4b,#312e81); padding:16px 32px; }
.week-header h2 { font-size:20px; font-weight:600; margin-bottom:10px; }
.week-header .week-selector { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.week-header select { background:rgba(255,255,255,0.1); color:var(--text); border:1px solid rgba(255,255,255,0.2); padding:6px 12px; border-radius:6px; font-size:13px; cursor:pointer; }
.week-header .week-info { color:var(--text2); font-size:13px; }
.container { max-width:1400px; margin:0 auto; padding:16px; }
/* Main Tabs */
.main-tabs { display:flex; gap:4px; margin-bottom:20px; background:var(--surface); padding:4px; border-radius:8px; flex-wrap:wrap; }
.main-tab { padding:8px 16px; background:transparent; border:none; border-radius:6px; cursor:pointer; color:var(--text2); font-size:13px; transition:all .2s; }
.main-tab.active { background:var(--accent); color:#fff; }
.main-tab:hover:not(.active) { color:var(--text); background:var(--surface2); }
.tab-content { display:none; }
.tab-content.active { display:block; }
/* KPI Cards */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; margin-bottom:24px; }
.kpi-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; }
.kpi-card h4 { font-size:13px; color:var(--text2); margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:8px; }
.kpi-item { display:flex; justify-content:space-between; align-items:center; padding:4px 0; }
.kpi-label { font-size:12px; color:var(--text2); }
.kpi-value { font-size:16px; font-weight:600; }
.kpi-change { font-size:11px; padding:2px 6px; border-radius:4px; }
.kpi-change.good { color:var(--green); background:rgba(63,185,80,.1); }
.kpi-change.bad { color:var(--red); background:rgba(248,81,73,.1); }
.kpi-change.neutral { color:var(--text2); background:var(--surface2); }
/* Charts */
.charts-row { display:grid; grid-template-columns:1fr; gap:20px; margin-bottom:24px; }
@media(min-width:1024px) { .charts-row.triple { grid-template-columns:1fr 1fr 1fr; } }
@media(min-width:768px) and (max-width:1023px) { .charts-row.triple { grid-template-columns:1fr 1fr; } }
.chart-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; }
.chart-card h3 { font-size:13px; color:var(--text2); margin-bottom:12px; }
.chart-card canvas { width:100% !important; }
/* Group selector */
.group-layout { display:grid; grid-template-columns:200px 1fr; gap:20px; }
@media(max-width:768px) { .group-layout { grid-template-columns:1fr; } }
.group-list { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:8px; max-height:600px; overflow-y:auto; }
.group-item { padding:8px 12px; border-radius:6px; cursor:pointer; font-size:13px; color:var(--text2); transition:all .2s; }
.group-item:hover { background:var(--surface2); color:var(--text); }
.group-item.active { background:var(--accent); color:#fff; }
.group-item .spu { display:block; font-size:11px; opacity:0.7; }
.group-detail { min-height:400px; }
/* Phase Table */
.phase-table { width:100%; border-collapse:collapse; margin:12px 0; font-size:13px; }
.phase-table th,.phase-table td { padding:8px 12px; border:1px solid var(--border); text-align:center; }
.phase-table th { background:var(--surface2); color:var(--accent); font-size:12px; }
.phase-table td { background:var(--surface); }
/* Report markdown */
.report-content { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:24px; }
.report-content h1 { color:var(--accent); font-size:1.4em; border-bottom:1px solid var(--border); padding-bottom:8px; margin-bottom:16px; }
.report-content h2 { color:var(--green); font-size:1.2em; margin-top:24px; margin-bottom:12px; }
.report-content h3 { color:var(--orange); font-size:1.05em; margin-top:20px; margin-bottom:8px; }
.report-content table { width:100%; border-collapse:collapse; margin:12px 0; font-size:.85em; overflow-x:auto; display:block; }
.report-content th,.report-content td { padding:6px 10px; border:1px solid var(--border); text-align:left; white-space:nowrap; }
.report-content th { background:var(--surface2); color:var(--accent); }
.report-content blockquote { border-left:3px solid var(--accent); padding:8px 16px; margin:12px 0; background:var(--surface2); color:var(--text2); border-radius:0 4px 4px 0; }
.report-content strong { color:#fff; }
.report-content hr { border:none; border-top:1px solid var(--border); margin:20px 0; }
.report-content ul,.report-content ol { padding-left:24px; margin:8px 0; }
.report-content li { margin:4px 0; }
.report-content p { margin:8px 0; }
.loading { text-align:center; padding:40px; color:var(--text2); }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">🎯 智能托管广告</div>
  <a href="index.html" class="nav-link">📊 报告中心</a>
  <a href="config.html" class="nav-link">⚙️ 托管组配置</a>
  <a href="weekly-report.html" class="nav-link active">📈 周报分析</a>
</div>
<div class="week-header">
  <h2>📊 智能广告托管周报</h2>
  <div class="week-selector">
    <span>📅 选择周报：</span>
    <select id="weekSelect"></select>
    <span class="week-info" id="weekInfo">加载中...</span>
  </div>
</div>
<div class="container">
  <div class="main-tabs">
    <button class="main-tab active" data-tab="eip-overall">🤖 EIP AI 整体</button>
    <button class="main-tab" data-tab="eip-groups">🤖 EIP 各组</button>
    <button class="main-tab" data-tab="oc-overall">🦞 OpenClaw 整体</button>
    <button class="main-tab" data-tab="oc-groups">🦞 OC 各组</button>
    <button class="main-tab" data-tab="report">📋 完整报告</button>
  </div>

  <div id="tab-eip-overall" class="tab-content active">
    <div class="kpi-row" id="eip-kpi"></div>
    <div class="charts-row triple" id="eip-charts"></div>
  </div>

  <div id="tab-eip-groups" class="tab-content">
    <div class="group-layout">
      <div class="group-list" id="eip-group-list"></div>
      <div class="group-detail" id="eip-group-detail"><div class="loading">选择一个托管组</div></div>
    </div>
  </div>

  <div id="tab-oc-overall" class="tab-content">
    <div class="kpi-row" id="oc-kpi"></div>
    <div class="charts-row triple" id="oc-charts"></div>
  </div>

  <div id="tab-oc-groups" class="tab-content">
    <div class="group-layout">
      <div class="group-list" id="oc-group-list"></div>
      <div class="group-detail" id="oc-group-detail"><div class="loading">选择一个托管组</div></div>
    </div>
  </div>

  <div id="tab-report" class="tab-content">
    <div class="report-content" id="report-content"><div class="loading">加载报告中...</div></div>
  </div>
</div>

<script>
Chart.defaults.color='#8b949e';
Chart.defaults.borderColor='#30363d';
Chart.defaults.font.size=11;

let DATA=null, weeklyIndex=[];
const COLORS={spend:'#58a6ff',sales:'#3fb950',acos:'#f85149',orders:'#bc8cff',volume:'#d29922',
  ctr:'#f0883e',cvr:'#a371f7',cpc:'#79c0ff',imp:'#8b949e',clicks:'#d2a8ff'};
const PHASE_COLORS=['rgba(88,166,255,0.06)','rgba(63,185,80,0.06)','rgba(248,81,73,0.06)'];

// ── Init ──
fetch('data/weekly-index.json').then(r=>r.json()).then(idx=>{
  weeklyIndex=idx;
  const sel=document.getElementById('weekSelect');
  idx.forEach((w,i)=>{const o=document.createElement('option');o.value=i;o.textContent=w.label;sel.appendChild(o)});
  sel.value=idx.length-1;
  sel.addEventListener('change',()=>loadWeek(+sel.value));
  loadWeek(idx.length-1);
});

document.querySelectorAll('.main-tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.main-tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('tab-'+t.dataset.tab).classList.add('active');
}));

function loadWeek(i){
  const w=weeklyIndex[i];
  document.getElementById('weekInfo').textContent='报告周期: '+w.label+' | 截至 '+w.endDate;
  const url=w.dataFile?'../data/weekly-reports/'+w.dataFile:'data/weekly-reports/weekly-data-'+w.endDate+'.json';
  fetch(url).then(r=>r.json()).then(d=>{DATA=d;renderAll()}).catch(e=>{
    // fallback path
    fetch('data/weekly-reports/weekly-data-'+w.endDate+'.json').then(r=>r.json()).then(d=>{DATA=d;renderAll()}).catch(e2=>{
      document.getElementById('eip-kpi').innerHTML='<div class="loading">数据加载失败: '+e2.message+'</div>';
    });
  });
  // Load report markdown
  fetch('data/weekly-reports/report-'+w.endDate+'.md').then(r=>r.ok?r.text():Promise.reject('not found'))
    .then(md=>{document.getElementById('report-content').innerHTML=marked.parse(md)})
    .catch(()=>{document.getElementById('report-content').innerHTML='<div class="loading">报告未生成</div>'});
}

// ── Helpers ──
function pn(v){return v==null?0:typeof v==='number'?v:parseFloat(String(v).replace(/[$%,]/g,''))||0}
function fmt(v,type){
  if(type==='pct')return v.toFixed(2)+'%';
  if(type==='dollar')return '$'+v.toFixed(2);
  if(type==='int')return Math.round(v).toLocaleString();
  return v.toFixed(2);
}
function chg(newV,oldV,inverse){
  if(!oldV||oldV===0)return{text:'N/A',cls:'neutral'};
  const d=((newV-oldV)/oldV*100);
  const good=inverse?(d<0):(d>0);
  return{text:(d>0?'+':'')+d.toFixed(1)+'%',cls:good?'good':'bad'};
}
function chgPP(newV,oldV,inverse){
  if(oldV==null)return{text:'N/A',cls:'neutral'};
  const d=newV-oldV;
  const good=inverse?(d<0):(d>0);
  return{text:(d>0?'+':'')+d.toFixed(2)+'pp',cls:good?'good':'bad'};
}

function mergeDaily(groups,key){
  // Merge daily arrays from multiple groups by date
  const map={};
  groups.forEach(g=>{
    const arr=g[key]||g.daily||[];
    arr.forEach(d=>{
      if(!map[d.date])map[d.date]={date:d.date,impressions:0,clicks:0,spend:0,orders:0,salesVolume:0,salesAmount:0};
      const m=d.metrics;
      map[d.date].impressions+=pn(m.impressions);
      map[d.date].clicks+=pn(m.clicks);
      map[d.date].spend+=pn(m.spend);
      map[d.date].orders+=pn(m.orders);
      map[d.date].salesVolume+=pn(m.salesVolume);
      map[d.date].salesAmount+=pn(m.salesAmount);
    });
  });
  return Object.values(map).sort((a,b)=>a.date.localeCompare(b.date)).map(d=>({
    date:d.date,
    metrics:{...d,
      acos:d.salesAmount>0?(d.spend/d.salesAmount*100):0,
      ctr:d.impressions>0?(d.clicks/d.impressions*100):0,
      cvr:d.clicks>0?(d.orders/d.clicks*100):0,
      cpc:d.clicks>0?(d.spend/d.clicks):0,
      roas:d.spend>0?(d.salesAmount/d.spend):0
    }
  }));
}

function mergePhases(groups){
  if(!groups[0]||!groups[0].phases)return[];
  return groups[0].phases.map((_,i)=>{
    let t={impressions:0,clicks:0,spend:0,orders:0,salesVolume:0,salesAmount:0};
    let days=0;
    groups.forEach(g=>{
      const p=g.phases[i];if(!p)return;
      t.impressions+=pn(p.metrics.impressions);t.clicks+=pn(p.metrics.clicks);
      t.spend+=pn(p.metrics.spend);t.orders+=pn(p.metrics.orders);
      t.salesVolume+=pn(p.metrics.salesVolume);t.salesAmount+=pn(p.metrics.salesAmount);
      days=p.days;
    });
    const ref=groups[0].phases[i];
    return{name:ref.name,start:ref.start,end:ref.end,type:ref.type,days,
      metrics:{...t,acos:t.salesAmount>0?(t.spend/t.salesAmount*100):0,ctr:t.impressions>0?(t.clicks/t.impressions*100):0,cvr:t.clicks>0?(t.orders/t.clicks*100):0,cpc:t.clicks>0?(t.spend/t.clicks):0},
      dailyAvg:{spend:t.spend/days,orders:t.orders/days,salesAmount:t.salesAmount/days,salesVolume:t.salesVolume/days,impressions:t.impressions/days,clicks:t.clicks/days}
    };
  });
}

// ── Render ──
function renderAll(){
  if(!DATA)return;
  renderEipOverall();
  renderEipGroups();
  renderOcOverall();
  renderOcGroups();
}

function renderEipOverall(){
  const groups=DATA.eipAiGroups;
  const phases=mergePhases(groups);
  const daily=mergeDaily(groups,'daily');
  if(!phases.length)return;

  // KPI
  const before=phases[0],offline=phases[1],online=phases[2];
  const kpiHtml=`
    <div class="kpi-card"><h4>📊 广告效果</h4>
      ${kpiRow('ACOS',fmt(online.metrics.acos,'pct'),chgPP(online.metrics.acos,before.metrics.acos,true))}
      ${kpiRow('日均花费',fmt(online.dailyAvg.spend,'dollar'),chg(online.dailyAvg.spend,before.dailyAvg.spend,false))}
      ${kpiRow('日均销售额',fmt(online.dailyAvg.salesAmount,'dollar'),chg(online.dailyAvg.salesAmount,before.dailyAvg.salesAmount,false))}
    </div>
    <div class="kpi-card"><h4>👁️ 曝光点击</h4>
      ${kpiRow('日均曝光',fmt(online.dailyAvg.impressions,'int'),chg(online.dailyAvg.impressions,before.dailyAvg.impressions,false))}
      ${kpiRow('日均点击',fmt(online.dailyAvg.clicks,'int'),chg(online.dailyAvg.clicks,before.dailyAvg.clicks,false))}
      ${kpiRow('CTR',fmt(online.metrics.ctr,'pct'),chgPP(online.metrics.ctr,before.metrics.ctr,false))}
    </div>
    <div class="kpi-card"><h4>🛒 转化</h4>
      ${kpiRow('日均订单',online.dailyAvg.orders.toFixed(1),chg(online.dailyAvg.orders,before.dailyAvg.orders,false))}
      ${kpiRow('CVR',fmt(online.metrics.cvr,'pct'),chgPP(online.metrics.cvr,before.metrics.cvr,false))}
      ${kpiRow('CPC',fmt(online.metrics.cpc,'dollar'),chg(online.metrics.cpc,before.metrics.cpc,true))}
    </div>`;
  document.getElementById('eip-kpi').innerHTML=kpiHtml;

  // Charts
  const dates=daily.map(d=>d.date.slice(5));
  const pLines=DATA.config?.eipPhases||[];
  const ct=document.getElementById('eip-charts');
  ct.innerHTML='';
  createDualChart(ct,'广告效果趋势','花费($)',daily.map(d=>d.metrics.spend),COLORS.spend,'销售额($)',daily.map(d=>d.metrics.salesAmount),COLORS.sales,'ACOS(%)',daily.map(d=>d.metrics.acos),COLORS.acos,dates,pLines);
  createDualChart(ct,'曝光点击趋势','曝光量',daily.map(d=>d.metrics.impressions),COLORS.imp,'点击量',daily.map(d=>d.metrics.clicks),COLORS.clicks,'CTR(%)',daily.map(d=>d.metrics.ctr),COLORS.ctr,dates,pLines);
  createDualChart(ct,'转化趋势','订单',daily.map(d=>d.metrics.orders),COLORS.orders,'销量',daily.map(d=>d.metrics.salesVolume),COLORS.volume,'CVR(%)',daily.map(d=>d.metrics.cvr),COLORS.cvr,dates,pLines);
}

function renderEipGroups(){
  const list=document.getElementById('eip-group-list');
  list.innerHTML='';
  DATA.eipAiGroups.forEach((g,i)=>{
    const el=document.createElement('div');
    el.className='group-item'+(i===0?' active':'');
    el.innerHTML=g.name+'<span class="spu">'+g.spu+'</span>';
    el.onclick=()=>{list.querySelectorAll('.group-item').forEach(x=>x.classList.remove('active'));el.classList.add('active');renderEipGroupDetail(g)};
    list.appendChild(el);
  });
  if(DATA.eipAiGroups.length)renderEipGroupDetail(DATA.eipAiGroups[0]);
}

function renderEipGroupDetail(g){
  const ct=document.getElementById('eip-group-detail');
  ct.innerHTML='';
  // Phase table
  if(g.phases&&g.phases.length>=3){
    const b=g.phases[0],ol=g.phases[1],on=g.phases[2];
    const tbl=document.createElement('div');
    tbl.innerHTML=`<h3 style="color:var(--accent);margin-bottom:12px">${g.name} 三阶段对比</h3>
    <table class="phase-table">
    <tr><th>指标</th><th>上线前(${b.days}天)</th><th>离线学习(${ol.days}天)</th><th>在线学习(${on.days}天)</th><th>在线vs上线前</th></tr>
    ${phaseRow('日均花费($)',b.metrics.spend/b.days,ol.metrics.spend/ol.days,on.metrics.spend/on.days,false)}
    ${phaseRow('日均订单',b.metrics.orders/b.days,ol.metrics.orders/ol.days,on.metrics.orders/on.days,false)}
    ${phaseRow('日均销售额($)',b.metrics.salesAmount/b.days,ol.metrics.salesAmount/ol.days,on.metrics.salesAmount/on.days,false)}
    ${phaseRowPct('ACOS',b.metrics.acos,ol.metrics.acos,on.metrics.acos,true)}
    ${phaseRowPct('CTR',b.metrics.ctr,ol.metrics.ctr,on.metrics.ctr,false)}
    ${phaseRowPct('CVR',b.metrics.cvr,ol.metrics.cvr,on.metrics.cvr,false)}
    </table>`;
    ct.appendChild(tbl);
  }
  // Charts
  if(g.daily&&g.daily.length){
    const dates=g.daily.map(d=>d.date.slice(5));
    const pLines=DATA.config?.eipPhases||[];
    const row=document.createElement('div');row.className='charts-row triple';ct.appendChild(row);
    createDualChart(row,'广告效果','花费($)',g.daily.map(d=>d.metrics.spend),COLORS.spend,'销售额($)',g.daily.map(d=>d.metrics.salesAmount),COLORS.sales,'ACOS(%)',g.daily.map(d=>d.metrics.acos),COLORS.acos,dates,pLines);
    createDualChart(row,'曝光点击','曝光',g.daily.map(d=>d.metrics.impressions),COLORS.imp,'点击',g.daily.map(d=>d.metrics.clicks),COLORS.clicks,'CTR(%)',g.daily.map(d=>d.metrics.ctr),COLORS.ctr,dates,pLines);
    createDualChart(row,'转化','订单',g.daily.map(d=>d.metrics.orders),COLORS.orders,'销量',g.daily.map(d=>d.metrics.salesVolume),COLORS.volume,'CVR(%)',g.daily.map(d=>d.metrics.cvr),COLORS.cvr,dates,pLines);
  }
}

function renderOcOverall(){
  const groups=DATA.openclawGroups;if(!groups.length)return;
  const daily=mergeDaily(groups,'daily');
  // Overall stats
  let t={spend:0,orders:0,salesVolume:0,salesAmount:0,impressions:0,clicks:0};
  groups.forEach(g=>{const m=g.overall.metrics;t.spend+=pn(m.spend);t.orders+=pn(m.orders);t.salesVolume+=pn(m.salesVolume);t.salesAmount+=pn(m.salesAmount);t.impressions+=pn(m.impressions);t.clicks+=pn(m.clicks)});
  const days=groups[0].overall.days;
  const acos=t.salesAmount>0?(t.spend/t.salesAmount*100):0;
  const ctr=t.impressions>0?(t.clicks/t.impressions*100):0;
  const cvr=t.clicks>0?(t.orders/t.clicks*100):0;
  const cpc=t.clicks>0?(t.spend/t.clicks):0;

  // Last 7 vs prev
  const last7=daily.slice(-7),prev=daily.slice(-12,-7);
  const l7avg=(arr,k)=>arr.reduce((s,d)=>s+pn(d.metrics[k]),0)/arr.length;

  const kpiHtml=`
    <div class="kpi-card"><h4>📊 整体效果 (${days}天)</h4>
      ${kpiRow('ACOS',acos.toFixed(2)+'%',{text:'',cls:'neutral'})}
      ${kpiRow('累计花费','$'+t.spend.toFixed(2),{text:days+'天',cls:'neutral'})}
      ${kpiRow('累计销售额','$'+t.salesAmount.toFixed(2),{text:'',cls:'neutral'})}
    </div>
    <div class="kpi-card"><h4>📈 日均数据</h4>
      ${kpiRow('日均花费','$'+(t.spend/days).toFixed(2),{text:'',cls:'neutral'})}
      ${kpiRow('日均订单',(t.orders/days).toFixed(1),{text:'',cls:'neutral'})}
      ${kpiRow('日均销售额','$'+(t.salesAmount/days).toFixed(2),{text:'',cls:'neutral'})}
    </div>
    <div class="kpi-card"><h4>🔄 近7天 vs 前5天</h4>
      ${kpiRow('日均ACOS',l7avg(last7,'acos').toFixed(2)+'%',prev.length?chgPP(l7avg(last7,'acos'),l7avg(prev,'acos'),true):{text:'N/A',cls:'neutral'})}
      ${kpiRow('日均订单',l7avg(last7,'orders').toFixed(1),prev.length?chg(l7avg(last7,'orders'),l7avg(prev,'orders'),false):{text:'N/A',cls:'neutral'})}
      ${kpiRow('日均花费','$'+l7avg(last7,'spend').toFixed(2),prev.length?chg(l7avg(last7,'spend'),l7avg(prev,'spend'),false):{text:'N/A',cls:'neutral'})}
    </div>`;
  document.getElementById('oc-kpi').innerHTML=kpiHtml;

  const dates=daily.map(d=>d.date.slice(5));
  const ct=document.getElementById('oc-charts');ct.innerHTML='';
  createDualChart(ct,'广告效果趋势','花费($)',daily.map(d=>d.metrics.spend),COLORS.spend,'销售额($)',daily.map(d=>d.metrics.salesAmount),COLORS.sales,'ACOS(%)',daily.map(d=>d.metrics.acos),COLORS.acos,dates,[]);
  createDualChart(ct,'曝光点击趋势','曝光量',daily.map(d=>d.metrics.impressions),COLORS.imp,'点击量',daily.map(d=>d.metrics.clicks),COLORS.clicks,'CTR(%)',daily.map(d=>d.metrics.ctr),COLORS.ctr,dates,[]);
  createDualChart(ct,'转化趋势','订单',daily.map(d=>d.metrics.orders),COLORS.orders,'销量',daily.map(d=>d.metrics.salesVolume),COLORS.volume,'CVR(%)',daily.map(d=>d.metrics.cvr),COLORS.cvr,dates,[]);
}

function renderOcGroups(){
  const list=document.getElementById('oc-group-list');list.innerHTML='';
  DATA.openclawGroups.forEach((g,i)=>{
    const el=document.createElement('div');
    el.className='group-item'+(i===0?' active':'');
    el.innerHTML=(g.name||g.id)+'<span class="spu">'+(g.spu||'')+'</span>';
    el.onclick=()=>{list.querySelectorAll('.group-item').forEach(x=>x.classList.remove('active'));el.classList.add('active');renderOcGroupDetail(g)};
    list.appendChild(el);
  });
  if(DATA.openclawGroups.length)renderOcGroupDetail(DATA.openclawGroups[0]);
}

function renderOcGroupDetail(g){
  const ct=document.getElementById('oc-group-detail');ct.innerHTML='';
  // Overall table
  if(g.overall){
    const m=g.overall.metrics,d=g.overall.days;
    const tbl=document.createElement('div');
    tbl.innerHTML=`<h3 style="color:var(--accent);margin-bottom:12px">${g.name} 累计数据 (${d}天)</h3>
    <table class="phase-table">
    <tr><th>指标</th><th>累计值</th><th>日均值</th></tr>
    <tr><td>花费</td><td>$${pn(m.spend).toFixed(2)}</td><td>$${(pn(m.spend)/d).toFixed(2)}</td></tr>
    <tr><td>订单</td><td>${pn(m.orders)}</td><td>${(pn(m.orders)/d).toFixed(1)}</td></tr>
    <tr><td>销售额</td><td>$${pn(m.salesAmount).toFixed(2)}</td><td>$${(pn(m.salesAmount)/d).toFixed(2)}</td></tr>
    <tr><td>ACOS</td><td colspan="2">${pn(m.acos).toFixed(2)}%</td></tr>
    <tr><td>CVR</td><td colspan="2">${pn(m.cvr).toFixed(2)}%</td></tr>
    <tr><td>CPC</td><td colspan="2">$${pn(m.cpc).toFixed(2)}</td></tr>
    </table>`;
    ct.appendChild(tbl);
  }
  // Charts
  if(g.daily&&g.daily.length){
    const dates=g.daily.map(d=>d.date.slice(5));
    const row=document.createElement('div');row.className='charts-row triple';ct.appendChild(row);
    createDualChart(row,'广告效果','花费($)',g.daily.map(d=>d.metrics.spend),COLORS.spend,'销售额($)',g.daily.map(d=>d.metrics.salesAmount),COLORS.sales,'ACOS(%)',g.daily.map(d=>d.metrics.acos),COLORS.acos,dates,[]);
    createDualChart(row,'曝光点击','曝光',g.daily.map(d=>d.metrics.impressions),COLORS.imp,'点击',g.daily.map(d=>d.metrics.clicks),COLORS.clicks,'CTR(%)',g.daily.map(d=>d.metrics.ctr),COLORS.ctr,dates,[]);
    createDualChart(row,'转化','订单',g.daily.map(d=>d.metrics.orders),COLORS.orders,'销量',g.daily.map(d=>d.metrics.salesVolume),COLORS.volume,'CVR(%)',g.daily.map(d=>d.metrics.cvr),COLORS.cvr,dates,[]);
  }
}

// ── Chart builder ──
function createDualChart(container,title,leftLabel1,leftData1,leftColor1,leftLabel2,leftData2,leftColor2,rightLabel,rightData,rightColor,labels,phaseLines){
  const card=document.createElement('div');card.className='chart-card';
  card.innerHTML='<h3>'+title+'</h3><canvas></canvas>';
  container.appendChild(card);

  // Phase annotations
  const annotations={};
  if(phaseLines&&phaseLines.length){
    phaseLines.forEach((p,i)=>{
      if(i===0)return; // skip first phase start
      const dateStr=(p.start||p.date||'').slice(5);
      const idx=labels.indexOf(dateStr);
      if(idx>=0){
        annotations['pline'+i]={type:'line',xMin:idx,xMax:idx,borderColor:'rgba(88,166,255,0.4)',borderWidth:1,borderDash:[4,4],
          label:{display:true,content:p.name||p.label||'',position:'start',color:'#8b949e',font:{size:9},backgroundColor:'rgba(0,0,0,0.5)',padding:2}
        };
      }
    });
  }

  new Chart(card.querySelector('canvas'),{
    type:'line',
    data:{labels,datasets:[
      {label:leftLabel1,data:leftData1,borderColor:leftColor1,backgroundColor:leftColor1+'33',fill:true,tension:.3,yAxisID:'y',pointRadius:0,borderWidth:2},
      {label:leftLabel2,data:leftData2,borderColor:leftColor2,backgroundColor:leftColor2+'22',fill:true,tension:.3,yAxisID:'y',pointRadius:0,borderWidth:2},
      {label:rightLabel,data:rightData,borderColor:rightColor,borderDash:[5,5],tension:.3,yAxisID:'y1',pointRadius:0,borderWidth:2,fill:false}
    ]},
    options:{
      responsive:true,maintainAspectRatio:true,aspectRatio:1.8,
      interaction:{intersect:false,mode:'index'},
      plugins:{
        legend:{position:'bottom',labels:{boxWidth:12,padding:8,usePointStyle:true}},
        annotation:{annotations},
        datalabels:{display:false}
      },
      scales:{
        x:{grid:{display:false},ticks:{maxRotation:45,font:{size:9}}},
        y:{type:'linear',position:'left',beginAtZero:true,title:{display:true,text:leftLabel1+' / '+leftLabel2,font:{size:10}}},
        y1:{type:'linear',position:'right',beginAtZero:true,grid:{drawOnChartArea:false},title:{display:true,text:rightLabel,font:{size:10}}}
      }
    }
  });
}

// ── KPI helpers ──
function kpiRow(label,value,change){
  return `<div class="kpi-item"><span class="kpi-label">${label}</span><span class="kpi-value">${value}</span>${change.text?`<span class="kpi-change ${change.cls}">${change.text}</span>`:''}</div>`;
}
function phaseRow(label,b,ol,on,inverse){
  const c=b>0?chg(on,b,inverse):{text:'N/A',cls:'neutral'};
  return `<tr><td>${label}</td><td>${b.toFixed(2)}</td><td>${ol.toFixed(2)}</td><td>${on.toFixed(2)}</td><td><span class="kpi-change ${c.cls}">${c.text}</span></td></tr>`;
}
function phaseRowPct(label,b,ol,on,inverse){
  const c=chgPP(on,b,inverse);
  return `<tr><td>${label}</td><td>${b.toFixed(2)}%</td><td>${ol.toFixed(2)}%</td><td>${on.toFixed(2)}%</td><td><span class="kpi-change ${c.cls}">${c.text}</span></td></tr>`;
}
</script>
